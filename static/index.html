<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>MeshCore</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3250;
      --accent: #4f8ef7;
      --accent-dim: #1e3370;
      --text: #e8eaf6;
      --text-muted: #7b82a8;
      --bubble-bg: #1e2235;
      --bubble-border: #2e3a60;
      --status-ok: #4caf88;
      --status-err: #e05c5c;
      --status-warn: #e0a030;
      --radius: 16px;
    }

    html {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 15px;
      display: flex;
      flex-direction: column;
      /* position:fixed + inset:0 is the most reliable way to fill exactly
         the visible viewport on mobile and prevent the page from scrolling
         when the soft keyboard opens */
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      padding-top: max(10px, env(safe-area-inset-top));
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      user-select: none;
    }

    .header-title {
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
    }

    /* ── Channel picker ── */
    .ch-picker-wrap {
      position: relative;
      flex: 1;
    }

    #channel-btn {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      white-space: nowrap;
      transition: border-color 0.15s;
    }

    #channel-btn:hover { border-color: var(--accent); }

    #channel-btn .btn-label { flex: 1; text-align: left; overflow: hidden; text-overflow: ellipsis; }

    #channel-btn .btn-arrow {
      font-size: 10px;
      color: var(--text-muted);
      transition: transform 0.15s;
    }

    #channel-btn.open .btn-arrow { transform: rotate(180deg); }

    #channel-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 6px;
      z-index: 100;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      min-width: 180px;
    }

    #channel-dropdown.open { display: block; }

    .ch-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 9px 10px;
      border: none;
      background: transparent;
      color: var(--text);
      border-radius: 7px;
      cursor: pointer;
      font-size: 14px;
      text-align: left;
      gap: 8px;
    }

    .ch-item:hover { background: var(--surface2); }

    .ch-item.active {
      background: var(--accent-dim);
      color: var(--accent);
    }

    .ch-name { flex: 1; }

    .ch-badge {
      background: var(--accent);
      color: #fff;
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 11px;
      font-weight: 700;
      min-width: 22px;
      text-align: center;
      flex-shrink: 0;
    }

    .ch-empty {
      padding: 10px;
      color: var(--text-muted);
      font-size: 13px;
      text-align: center;
    }

    /* ── Burger menu ── */
    #burger-btn {
      width: 36px; height: 36px;
      background: none; border: none;
      color: var(--text-muted); cursor: pointer;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 5px;
      flex-shrink: 0; border-radius: 8px;
      transition: background 0.15s;
    }
    #burger-btn:hover { background: var(--surface2); color: var(--text); }
    #burger-btn span {
      display: block; width: 18px; height: 2px;
      background: currentColor; border-radius: 1px;
    }

    #nav-menu {
      display: none; position: absolute;
      top: calc(100% + 4px); right: 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 6px;
      z-index: 200; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      min-width: 160px;
    }
    #nav-menu.open { display: block; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      width: 100%; padding: 9px 12px;
      border: none; background: none; color: var(--text);
      border-radius: 7px; cursor: pointer; font-size: 14px; text-align: left;
    }
    .nav-item:hover { background: var(--surface2); }
    .nav-item.active { color: var(--accent); background: var(--accent-dim); }

    /* ── Page visibility ── */
    /* min-height:0 is critical: flex items default to min-height:auto,
       meaning they grow to fit content and never let overflow-y:auto
       activate on the scroll child. Setting it to 0 allows the flex
       item to shrink below its content size so the inner scroll works. */
    .page { display: none; flex: 1; min-height: 0; flex-direction: column; overflow: hidden; }
    .page.active { display: flex; }

    /* ── Chats list page ── */
    #page-chats {
      overflow-y: auto; padding: 12px 16px;
      gap: 0; flex-direction: column;
    }
    #page-chats::-webkit-scrollbar { width: 6px; }
    #page-chats::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .chat-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 8px; border-radius: 10px;
      cursor: pointer; border-bottom: 1px solid var(--border);
    }
    .chat-item:hover { background: var(--surface2); }
    .chat-item:last-child { border-bottom: none; }
    .chat-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700; flex-shrink: 0;
      background: var(--surface2);
    }
    .chat-item-body { flex: 1; min-width: 0; }
    .chat-item-header { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
    .chat-item-name { font-weight: 600; font-size: 14px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-item-time { font-size: 11px; color: var(--text-secondary); flex-shrink: 0; }
    .chat-item-preview { font-size: 12px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .chat-unread {
      background: var(--accent); color: #fff;
      border-radius: 10px; font-size: 11px; font-weight: 700;
      padding: 1px 6px; flex-shrink: 0; min-width: 18px; text-align: center;
    }

    /* ── DM thread page ── */
    #page-dm {
      flex-direction: column;
    }
    #dm-header {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; background: var(--surface);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    #dm-back {
      background: none; border: none; color: var(--accent);
      cursor: pointer; font-size: 22px; line-height: 1; padding: 0 4px;
    }
    #dm-contact-name { font-weight: 600; font-size: 15px; }
    #dm-messages {
      flex: 1; min-height: 0; overflow-y: auto; padding: 12px 16px;
      display: flex; flex-direction: column; gap: 4px;
    }
    #dm-messages::-webkit-scrollbar { width: 6px; }
    #dm-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    #dm-compose {
      display: flex; gap: 8px; padding: 10px 12px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      background: var(--surface); border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    #dm-input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; padding: 8px 14px; color: var(--text);
      font-size: 14px; resize: none; font-family: inherit; outline: none;
    }
    #dm-input:focus { border-color: var(--accent); }
    #dm-send {
      width: 38px; height: 38px; border-radius: 50%;
      border: none; background: var(--accent); color: #fff;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    #dm-send:disabled { opacity: 0.4; cursor: default; }

    /* ── Contacts page ── */
    #page-contacts {
      flex-direction: column; overflow: hidden;
    }
    #contacts-toolbar {
      display: flex; align-items: center; flex-wrap: wrap; gap: 8px;
      padding: 10px 14px; background: var(--surface);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    #contacts-toolbar select, #contacts-toolbar input {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: 6px; padding: 5px 8px;
      font-size: 12px; outline: none;
    }
    #contacts-toolbar select:focus, #contacts-toolbar input:focus { border-color: var(--accent); }
    #contacts-toolbar label { font-size: 12px; color: var(--text-secondary); }
    #contacts-mgmt {
      display: flex; align-items: center; flex-wrap: wrap; gap: 8px;
      padding: 8px 14px; background: var(--surface2);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .mgmt-label { font-size: 12px; color: var(--text-secondary); }
    .toggle-wrap { display: flex; align-items: center; gap: 6px; }
    .toggle {
      position: relative; width: 36px; height: 20px; cursor: pointer;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0; background: var(--border);
      border-radius: 20px; transition: background 0.2s;
    }
    .toggle-slider::before {
      content: ""; position: absolute;
      width: 14px; height: 14px; left: 3px; top: 3px;
      background: #fff; border-radius: 50%; transition: transform 0.2s;
    }
    .toggle input:checked + .toggle-slider { background: var(--accent); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(16px); }

    .mgmt-btn {
      font-size: 12px; padding: 4px 10px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); border-radius: 6px; cursor: pointer;
    }
    .mgmt-btn:hover { border-color: var(--accent); color: var(--accent); }
    .mgmt-btn.danger:hover { border-color: var(--status-err); color: var(--status-err); }
    .mgmt-spacer { flex: 1; }

    /* ── Pending contacts page ── */
    #page-pending {
      flex-direction: column; overflow: hidden;
    }
    #pending-header {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; background: var(--surface);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
      font-weight: 600; font-size: 15px;
    }
    #pending-toolbar {
      display: flex; align-items: center; flex-wrap: wrap; gap: 10px;
      padding: 8px 14px; background: var(--surface2);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
      font-size: 12px;
    }
    #pending-scroll {
      flex: 1; min-height: 0; overflow-y: auto;
      padding: 10px 14px; display: flex; flex-direction: column; gap: 8px;
    }
    .pending-card {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px;
    }
    .pending-card.matched {
      border-color: var(--accent);
    }
    .pending-name { font-size: 14px; font-weight: 600; }
    .pending-meta { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
    .pending-match-tag {
      font-size: 10px; font-weight: 600;
      background: var(--accent-dim); color: var(--accent);
      border: 1px solid var(--accent); border-radius: 4px;
      padding: 1px 6px; white-space: nowrap;
    }
    .add-btn {
      font-size: 12px; padding: 5px 14px;
      background: var(--accent-dim); border: 1px solid var(--accent);
      color: var(--accent); border-radius: 6px; cursor: pointer; flex-shrink: 0;
    }
    .add-btn:hover { background: var(--accent); color: #fff; }
    .contacts-count {
      font-size: 12px; color: var(--text-secondary); margin-left: auto;
    }

    #contacts-list {
      flex: 1; min-height: 0; overflow-y: auto; padding: 10px 14px;
      display: flex; flex-direction: column; gap: 8px;
    }
    #contacts-list::-webkit-scrollbar { width: 6px; }
    #contacts-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .contact-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px;
      display: flex; align-items: center; gap: 12px;
    }
    .contact-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 700; flex-shrink: 0;
      background: var(--surface2);
    }
    .contact-body { flex: 1; min-width: 0; }
    .contact-name { font-weight: 600; font-size: 14px; color: var(--text); }
    .contact-meta {
      display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px;
    }
    .contact-chip {
      font-size: 11px; color: var(--text-secondary);
      background: var(--surface2); border-radius: 4px;
      padding: 1px 6px;
    }
    .contact-chip.type-repeater { color: #6fcf97; }
    .contact-chip.type-gateway  { color: #f2c94c; }
    .contact-chip.type-room     { color: #56ccf2; }
    .contact-map { font-size: 12px; color: var(--accent); text-decoration: none; flex-shrink: 0; }
    .contact-map:hover { text-decoration: underline; }
    #contacts-empty {
      color: var(--text-muted); font-size: 14px;
      text-align: center; margin-top: 40px;
    }

    /* ── Nodes page ── */
    #page-nodes {
      overflow-y: auto; padding: 16px;
      gap: 12px; flex-direction: column;
    }
    #page-nodes::-webkit-scrollbar { width: 6px; }
    #page-nodes::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .node-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 14px 16px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .node-name {
      font-size: 15px; font-weight: 600;
    }
    .node-stats {
      display: flex; gap: 10px; flex-wrap: wrap;
    }
    .node-stat {
      display: flex; flex-direction: column;
      background: var(--surface2); border-radius: 8px;
      padding: 6px 10px; min-width: 80px;
    }
    .node-stat-label {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 2px;
    }
    .node-stat-value { font-size: 14px; font-weight: 600; }
    .snr-good  { color: var(--status-ok); }
    .snr-ok    { color: var(--status-warn); }
    .snr-poor  { color: var(--status-err); }

    .node-footer {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 12px; color: var(--text-muted);
    }
    .map-link {
      color: var(--accent); text-decoration: none; font-weight: 500;
      display: flex; align-items: center; gap: 4px;
    }
    .map-link:hover { text-decoration: underline; }

    /* ── Status pill ── */
    #status {
      font-size: 12px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.3s, color 0.3s;
    }

    #status::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    #status.connected    { background: #0d2b1e; color: var(--status-ok); }
    #status.connected::before { background: var(--status-ok); box-shadow: 0 0 6px var(--status-ok); }
    #status.disconnected { background: #2a1010; color: var(--status-err); }
    #status.disconnected::before { background: var(--status-err); }
    #status.reconnecting { background: #2a1d06; color: var(--status-warn); }
    #status.reconnecting::before { background: var(--status-warn); animation: pulse 1s ease-in-out infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── Message list ── */
    #messages {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 16px 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Empty / prompt states ── */
    .msg-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text-muted);
      pointer-events: none;
    }

    .msg-empty svg { opacity: 0.2; }
    .msg-empty p { font-size: 14px; }

    /* ── Bubble ── */
    .bubble-row {
      display: flex;
      flex-direction: column;
      max-width: min(520px, 88%);
      animation: fadeUp 0.18s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Hop badge & path popup ── */
    .hop-badge {
      font-size: 10px;
      font-weight: 400;
      color: var(--text-secondary);
      margin-left: 5px;
      cursor: pointer;
      user-select: none;
      vertical-align: middle;
    }
    .hop-badge:hover { color: var(--accent); }

    .direct-badge {
      font-size: 10px;
      font-weight: 600;
      color: var(--status-ok);
      background: rgba(76, 175, 136, 0.12);
      border: 1px solid rgba(76, 175, 136, 0.3);
      border-radius: 4px;
      padding: 1px 5px;
      margin-left: 5px;
      vertical-align: middle;
      white-space: nowrap;
    }

    .sender-map-link {
      display: inline-flex;
      align-items: center;
      color: var(--accent);
      margin-left: 5px;
      vertical-align: middle;
      text-decoration: none;
      opacity: 0.75;
    }
    .sender-map-link:hover { opacity: 1; }

    .hop-popup {
      position: fixed;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 12px;
      line-height: 1.8;
      z-index: 999;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      min-width: 140px;
      max-width: 280px;
      pointer-events: auto;
    }
    .hop-popup .pop-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .hop-popup .pop-node {
      display: flex; align-items: center; gap: 6px;
    }
    .hop-popup .pop-node-idx {
      color: var(--text-secondary);
      font-size: 10px;
      min-width: 14px;
    }
    .hop-popup .pop-node-name { color: var(--text); }
    .hop-popup .pop-node-hash { color: var(--text-secondary); font-family: monospace; }

    .sender {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 3px;
      padding-left: 4px;
    }

    .bubble {
      background: var(--bubble-bg);
      border: 1px solid var(--bubble-border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      padding: 10px 14px;
      position: relative;
      word-break: break-word;
      line-height: 1.5;
    }

    .bubble .text { padding-right: 44px; line-height: 1.6; }

    /* ── Mention pill (@[Name] → @Name) ── */
    .mention {
      display: inline-block;
      background: rgba(79, 142, 247, 0.15);
      color: var(--accent);
      border-radius: 4px;
      padding: 0 5px;
      font-size: 0.88em;
      font-weight: 600;
      white-space: nowrap;
    }

    .bubble .time {
      position: absolute;
      bottom: 7px;
      right: 10px;
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* ── Own (sent) bubbles ── */
    .bubble-row.own {
      align-self: flex-end;
      align-items: flex-end;
    }

    .bubble-row.own .sender {
      padding-left: 0;
      padding-right: 4px;
      text-align: right;
    }

    .bubble-row.own .bubble {
      background: #1a3a5c;
      border-color: #2a5a8a;
      border-bottom-left-radius: var(--radius);
      border-bottom-right-radius: 4px;
    }

    /* ── Relay status ── */
    .relay-row {
      display: flex; align-items: center; flex-wrap: wrap;
      gap: 5px; padding: 2px 4px;
      font-size: 11px; color: var(--text-muted);
      min-height: 20px;
    }
    .relay-label { white-space: nowrap; }
    .relay-tag {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 4px; padding: 1px 6px;
      font-size: 11px; color: var(--text);
    }
    .relay-none  { color: var(--status-err); }
    .relay-ok    { color: var(--status-ok); }
    .relay-waiting { font-style: italic; }
    .retry-btn {
      background: none; border: 1px solid var(--border);
      color: var(--accent); border-radius: 4px;
      padding: 1px 8px; font-size: 11px; cursor: pointer;
    }
    .retry-btn:hover { background: var(--accent-dim); }

    /* ── Reply banner ── */
    #reply-banner {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 14px;
      background: var(--accent-dim);
      border-top: 1px solid var(--accent);
      font-size: 13px; color: var(--accent);
      flex-shrink: 0;
    }
    #reply-dismiss {
      background: none; border: none; color: var(--accent);
      cursor: pointer; font-size: 14px; padding: 0 0 0 8px; line-height: 1;
      opacity: 0.7;
    }
    #reply-dismiss:hover { opacity: 1; }

    /* ── Compose bar ── */
    #compose {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #msg-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 10px 16px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
    }

    #msg-input::placeholder { color: var(--text-muted); }
    #msg-input:focus { border-color: var(--accent); }
    #msg-input:disabled { opacity: 0.4; cursor: not-allowed; }

    #send-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, opacity 0.15s;
    }

    #send-btn:hover:not(:disabled) { background: #6aa0ff; }
    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Date separator ── */
    .date-sep {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-muted);
      font-size: 12px;
      margin: 4px 0;
    }

    .date-sep::before,
    .date-sep::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }
  </style>
</head>
<body>

<header>
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">
    <path d="M12 2a9 9 0 0 1 9 9c0 4.97-4.03 9-9 9a9 9 0 0 1-9-9 9 9 0 0 1 9-9z" opacity=".3"/>
    <path d="M12 6v6l4 2"/>
    <circle cx="12" cy="12" r="1" fill="var(--accent)" stroke="none"/>
  </svg>
  <span class="header-title">MeshCore</span>

  <div class="ch-picker-wrap">
    <button id="channel-btn" aria-haspopup="listbox" aria-expanded="false">
      <span class="btn-label">Select channel…</span>
      <span class="btn-arrow">▼</span>
    </button>
    <div id="channel-dropdown" role="listbox"></div>
  </div>

  <div id="status" class="disconnected">Disconnected</div>

  <div style="position:relative">
    <button id="burger-btn" aria-label="Menu">

    </button>
    <div id="nav-menu">

        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Chat
      </button>
      <button class="nav-item" data-page="chats" id="nav-chats">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 9h8M8 13h6"/><path d="M3 5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H7l-4 4V5z"/></svg>
        Chats
      </button>
      <button class="nav-item" data-page="contacts">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Contacts
      </button>
      <button class="nav-item" data-page="pending" id="nav-pending">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Pending
      </button>
      <button class="nav-item" data-page="nodes">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="3"/><circle cx="5" cy="19" r="3"/><circle cx="19" cy="19" r="3"/><line x1="12" y1="8" x2="5.5" y2="16"/><line x1="12" y1="8" x2="18.5" y2="16"/></svg>
        Nodes
      </button>
    </div>
  </div>
</header>

  <div id="compose">

</div><!-- end page-chat -->

      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>

  <div id="contacts-toolbar">

      <select id="contacts-sort">
        <option value="name">Alphabetical</option>

      <select id="filter-hops">

    <p style="color:var(--text-muted);font-size:14px;text-align:center;margin-top:40px">Waiting for node advertisements…</p>
  </div>
</div>

<script>
  const statusEl   = document.getElementById("status");
  const messagesEl = document.getElementById("messages");
  const channelBtn = document.getElementById("channel-btn");
  const dropdown   = document.getElementById("channel-dropdown");
  const msgInput   = document.getElementById("msg-input");
  const sendBtn    = document.getElementById("send-btn");

  // ── Colour palette ───────────────────────────────────────────────────────
  const COLOURS = [
    "#6fa8ff", "#ff7e7e", "#6fcf97", "#f2c94c",
    "#bb86fc", "#56ccf2", "#f2994a", "#eb5757",
  ];

  function senderColour(name) {
    let h = 0;
    for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
    return COLOURS[h % COLOURS.length];
  }

  // ── Formatting ───────────────────────────────────────────────────────────
  function fmtTime(unix) {
    return new Date(unix * 1000).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", hour12: false });
  }

  function fmtDate(unix) {
    const d = new Date(unix * 1000), today = new Date(), yest = new Date(today);
    yest.setDate(today.getDate() - 1);
    if (d.toDateString() === today.toDateString()) return "Today";
    if (d.toDateString() === yest.toDateString()) return "Yesterday";
    return d.toLocaleDateString([], { weekday: "long", month: "short", day: "numeric" });
  }

  // ── Channel store ────────────────────────────────────────────────────────
  // Map<channel_idx, { name, messages: [], unread: 0 }>
  const channels = new Map();
  let currentIdx = null;
  const seenIds  = new Set();
  let atBottom   = true;

  messagesEl.addEventListener("scroll", () => {
    atBottom = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 60;
  });

  function getOrCreateChannel(idx, name) {
    if (!channels.has(idx)) {
      channels.set(idx, { name: name || `ch${idx}`, messages: [], unread: 0 });
    } else if (name) {
      channels.get(idx).name = name;
    }
    return channels.get(idx);
  }

  // ── Channel picker UI ────────────────────────────────────────────────────
  function renderDropdown() {
    dropdown.innerHTML = "";
    if (channels.size === 0) {
      dropdown.innerHTML = '<div class="ch-empty">No channels yet…</div>';
      return;
    }
    const sorted = [...channels.entries()].sort((a, b) => a[0] - b[0]);
    for (const [idx, ch] of sorted) {
      const btn = document.createElement("button");
      btn.className = "ch-item" + (idx === currentIdx ? " active" : "");
      btn.setAttribute("role", "option");
      btn.setAttribute("aria-selected", idx === currentIdx);

      const nameEl = document.createElement("span");
      nameEl.className = "ch-name";
      nameEl.textContent = ch.name;
      btn.appendChild(nameEl);

      if (ch.unread > 0) {
        const badge = document.createElement("span");
        badge.className = "ch-badge";
        badge.textContent = ch.unread;
        btn.appendChild(badge);
      }

      btn.addEventListener("click", () => selectChannel(idx));
      dropdown.appendChild(btn);
    }
  }

  function updateChannelBtn() {
    const label = channelBtn.querySelector(".btn-label");
    if (currentIdx === null) {
      label.textContent = "Select channel…";
    } else {
      const ch = channels.get(currentIdx);
      label.textContent = ch ? ch.name : `ch${currentIdx}`;
    }
  }

  // Toggle dropdown open/close
  channelBtn.addEventListener("click", () => {
    const open = dropdown.classList.toggle("open");
    channelBtn.classList.toggle("open", open);
    channelBtn.setAttribute("aria-expanded", open);
    if (open) renderDropdown();
  });

  // Close dropdown on outside click
  document.addEventListener("click", (e) => {
    if (!channelBtn.contains(e.target) && !dropdown.contains(e.target)) {
      dropdown.classList.remove("open");
      channelBtn.classList.remove("open");
      channelBtn.setAttribute("aria-expanded", false);
    }
  });

  // ── Select a channel ─────────────────────────────────────────────────────
  function selectChannel(idx) {
    currentIdx = idx;
    const ch = channels.get(idx);
    if (ch) ch.unread = 0;
    dropdown.classList.remove("open");
    channelBtn.classList.remove("open");
    channelBtn.setAttribute("aria-expanded", false);
    updateChannelBtn();
    renderDropdown();
    renderMessages();
    updateCompose();
    // Always switch back to the chat page
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById("page-chat").classList.add("active");
    document.querySelectorAll(".nav-item").forEach(b => {
      b.classList.toggle("active", b.dataset.page === "chat");
    });
  }

  // ── Render all messages for the selected channel ─────────────────────────
  function renderMessages() {
    messagesEl.innerHTML = "";

    if (currentIdx === null) {
      messagesEl.appendChild(makeEmpty("Select a channel above to view messages"));
      return;
    }

    const ch = channels.get(currentIdx);
    if (!ch || ch.messages.length === 0) {
      messagesEl.appendChild(makeEmpty("No messages yet"));
      return;
    }

    let lastDate = null;
    for (const msg of ch.messages) {
      const dl = fmtDate(msg.timestamp);
      if (dl !== lastDate) {
        lastDate = dl;
        const sep = document.createElement("div");
        sep.className = "date-sep";
        sep.textContent = dl;
        messagesEl.appendChild(sep);
      }
      messagesEl.appendChild(buildBubble(msg));
    }
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function makeEmpty(text) {
    const el = document.createElement("div");
    el.className = "msg-empty";
    el.innerHTML = `
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <p>${text}</p>`;
    return el;
  }

  // ── Hop-path popup ───────────────────────────────────────────────────────
  let _hopPopup = null;

  function showHopPopup(event, pathNodes) {
    dismissHopPopup();

    const pop = document.createElement("div");
    pop.className = "hop-popup";

    const title = document.createElement("div");
    title.className = "pop-title";
    title.textContent = "Relay path";
    pop.appendChild(title);

    pathNodes.forEach((node, i) => {
      const row = document.createElement("div");
      row.className = "pop-node";

      const idx = document.createElement("span");
      idx.className = "pop-node-idx";
      idx.textContent = `${i + 1}.`;
      row.appendChild(idx);

      const label = document.createElement("span");
      if (node.name) {
        label.className = "pop-node-name";
        label.textContent = node.name;
      } else {
        label.className = "pop-node-hash";
        label.textContent = node.hash.slice(0, 8);
      }
      row.appendChild(label);
      pop.appendChild(row);
    });

    // Position near the badge click
    document.body.appendChild(pop);
    const x = Math.min(event.clientX + 8, window.innerWidth  - pop.offsetWidth  - 12);
    const y = Math.min(event.clientY + 8, window.innerHeight - pop.offsetHeight - 12);
    pop.style.left = `${x}px`;
    pop.style.top  = `${y}px`;

    _hopPopup = pop;

    // Dismiss on next click anywhere
    setTimeout(() => {
      document.addEventListener("click", dismissHopPopup, { once: true });
    }, 0);
  }

  function dismissHopPopup() {
    if (_hopPopup) { _hopPopup.remove(); _hopPopup = null; }
  }

  // Render text with @[Name] patterns replaced by styled mention pills
  function renderText(text) {
    const span = document.createElement("span");
    span.className = "text";
    const parts = text.split(/(@\[[^\]]+\])/);
    for (const part of parts) {
      const m = part.match(/^@\[([^\]]+)\]$/);
      if (m) {
        const pill = document.createElement("span");
        pill.className = "mention";
        pill.textContent = "@" + m[1];
        span.appendChild(pill);
      } else if (part) {
        span.appendChild(document.createTextNode(part));
      }
    }
    return span;
  }

  // ── Reply state ──────────────────────────────────────────────────────────
  const replyBanner  = document.getElementById("reply-banner");
  const replyLabel   = document.getElementById("reply-label");
  const replyDismiss = document.getElementById("reply-dismiss");
  let replyingTo = null;

  function setReplyTo(sender) {
    replyingTo = sender;
    replyLabel.textContent = `Replying to ${sender}`;
    replyBanner.style.display = "flex";
    msgInput.focus();
  }

  function clearReply() {
    replyingTo = null;
    replyBanner.style.display = "none";
  }

  replyDismiss.addEventListener("click", clearReply);

  // ── Compose bar ─────────────────────────────────────────────────────────
  let wsConnected = false;

  function updateCompose() {
    const enabled = wsConnected && currentIdx !== null;
    msgInput.disabled = !enabled;
    sendBtn.disabled  = !enabled;
    msgInput.placeholder = !wsConnected ? "Not connected…"
                         : currentIdx === null ? "Select a channel first…"
                         : "Message…";
  }

  function sendMessage() {
    const raw = msgInput.value.trim();
    if (!raw || !wsConnected || currentIdx === null || !ws) return;
    const text = replyingTo ? `@[${replyingTo}] ${raw}` : raw;
    ws.send(JSON.stringify({ type: "send", channel_idx: currentIdx, text }));
    msgInput.value = "";
    clearReply();
  }

  sendBtn.addEventListener("click", sendMessage);
  msgInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function buildBubble(msg) {
    const row = document.createElement("div");
    row.className = msg.own ? "bubble-row own" : "bubble-row";

    const senderDiv = document.createElement("div");
    senderDiv.className = "sender";

    const senderName = document.createElement("span");
    senderName.textContent = msg.sender;
    senderName.style.color = senderColour(msg.sender);
    senderDiv.appendChild(senderName);

    if (!msg.own) {
      if (msg.hops > 0 && msg.path && msg.path.length > 0) {
        const badge = document.createElement("span");
        badge.className = "hop-badge";
        badge.textContent = `${msg.hops} hop${msg.hops !== 1 ? "s" : ""}`;
        badge.title = "Click to see relay path";
        badge.addEventListener("click", (e) => {
          e.stopPropagation();
          showHopPopup(e, msg.path);
        });
        senderDiv.appendChild(badge);
      } else {
        // Direct (no relay hops) — show indicator + SNR
        const direct = document.createElement("span");
        direct.className = "direct-badge";
        direct.textContent = "📡 direct" + (msg.snr != null ? ` · ${msg.snr} dB` : "");
        senderDiv.appendChild(direct);
      }

      // Map link if sender location is known
      if (msg.sender_lat != null && msg.sender_lon != null &&
          (msg.sender_lat !== 0 || msg.sender_lon !== 0)) {
        const mapLink = document.createElement("a");
        mapLink.className = "sender-map-link";
        mapLink.href = `https://www.google.com/maps?q=${msg.sender_lat},${msg.sender_lon}`;
        mapLink.target = "_blank";
        mapLink.rel = "noopener";
        mapLink.title = `${msg.sender_lat.toFixed(4)}, ${msg.sender_lon.toFixed(4)}`;
        mapLink.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`;
        senderDiv.appendChild(mapLink);
      }
    }

    row.appendChild(senderDiv);

    const bubble = document.createElement("div");
    bubble.className = "bubble";

    const textSpan = renderText(msg.text);

    const timeSpan = document.createElement("span");
    timeSpan.className = "time";
    timeSpan.textContent = fmtTime(msg.timestamp);

    bubble.appendChild(textSpan);
    bubble.appendChild(timeSpan);
    row.appendChild(bubble);

    // Tap to reply — skip own messages
    if (!msg.own) {
      row.style.cursor = "pointer";
      row.addEventListener("click", () => setReplyTo(msg.sender));
    }

    if (msg.own) {
      const relayRow = document.createElement("div");
      relayRow.className = "relay-row";
      relayRows.set(msg.id, relayRow);
      msg.relayRowRef = relayRow;
      // Restore relay state if already known (e.g. after channel switch re-render)
      renderRelayRow(relayRow, msg.relayers || [], msg.relayFinal || false);
      row.appendChild(relayRow);
    }

    return row;
  }

  // ── Process an incoming message ──────────────────────────────────────────
  function processMessage(msg) {
    // Skip system messages and anything without a real channel
    if (msg.channel_idx == null || msg.channel_name === "system") return;
    if (seenIds.has(msg.id)) return;
    seenIds.add(msg.id);

    const ch = getOrCreateChannel(msg.channel_idx, msg.channel_name);
    ch.messages.push(msg);

    if (msg.channel_idx === currentIdx) {
      // Append to live view
      const dl = fmtDate(msg.timestamp);
      // Check if we need a date separator (compare against last rendered date)
      const seps = messagesEl.querySelectorAll(".date-sep");
      const lastSep = seps[seps.length - 1];
      if (!lastSep || lastSep.textContent !== dl) {
        const sep = document.createElement("div");
        sep.className = "date-sep";
        sep.textContent = dl;
        messagesEl.appendChild(sep);
      }
      const bubble = buildBubble(msg);
      // Only animate new live messages, not history replays
      messagesEl.appendChild(bubble);
      if (atBottom) messagesEl.scrollTop = messagesEl.scrollHeight;
    } else {
      // Background channel: increment unread
      ch.unread++;
      // If this is the first message in any channel and nothing is selected, auto-select
      if (currentIdx === null) {
        selectChannel(msg.channel_idx);
        return;
      }
    }

    updateChannelBtn();
    // Re-render dropdown to update unread badges (only if open)
    if (dropdown.classList.contains("open")) renderDropdown();
    // Update btn badge indicator: show total unread across non-selected channels
    updateBtnBadge();
  }

  // Show a total unread dot on the button when dropdown is closed
  function updateBtnBadge() {
    let total = 0;
    for (const [idx, ch] of channels) {
      if (idx !== currentIdx) total += ch.unread;
    }
    let badge = channelBtn.querySelector(".ch-badge");
    if (total > 0) {
      if (!badge) {
        badge = document.createElement("span");
        badge.className = "ch-badge";
        channelBtn.insertBefore(badge, channelBtn.querySelector(".btn-arrow"));
      }
      badge.textContent = total;
    } else if (badge) {
      badge.remove();
    }
  }

  // ── Burger / page nav ────────────────────────────────────────────────────
  const burgerBtn = document.getElementById("burger-btn");
  const navMenu   = document.getElementById("nav-menu");

  burgerBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    navMenu.classList.toggle("open");
  });
  document.addEventListener("click", (e) => {
    if (!navMenu.contains(e.target) && e.target !== burgerBtn)
      navMenu.classList.remove("open");
  });

  navMenu.querySelectorAll(".nav-item").forEach(btn => {
    btn.addEventListener("click", () => {
      navMenu.classList.remove("open");
      const page = btn.dataset.page;
      document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
      document.getElementById("page-" + page).classList.add("active");
      navMenu.querySelectorAll(".nav-item").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      if (page === "chats") renderChatsList();
      if (page === "contacts") renderContacts();
      if (page === "pending") renderPending();
      if (page === "nodes") renderNodes();
    });
  });

  // ── Relay tracking ───────────────────────────────────────────────────────
  const relayRows = new Map(); // msg_id -> relay-row DOM element

  function renderRelayRow(row, relayers, final) {
    row.innerHTML = "";
    if (!final && relayers.length === 0) {
      const s = document.createElement("span");
      s.className = "relay-label relay-waiting";
      s.textContent = "Listening for relays…";
      row.appendChild(s);
      return;
    }
    if (relayers.length > 0) {
      const lbl = document.createElement("span");
      lbl.className = "relay-label relay-ok";
      lbl.textContent = "↺";
      row.appendChild(lbl);
      for (const r of relayers) {
        const tag = document.createElement("span");
        tag.className = "relay-tag";
        tag.textContent = r.name;
        row.appendChild(tag);
      }
    } else if (final) {
      const lbl = document.createElement("span");
      lbl.className = "relay-label relay-none";
      lbl.textContent = "No relay heard";
      row.appendChild(lbl);
      const btn = document.createElement("button");
      btn.className = "retry-btn";
      btn.textContent = "Retry";
      btn.addEventListener("click", () => {
        for (const [, ch] of channels) {
          const m = ch.messages.find(x => x.relayRowRef === row);
          if (m && ws) {
            ws.send(JSON.stringify({ type: "send", channel_idx: m.channel_idx, text: m.text }));
            lbl.textContent = "Retrying…";
            btn.remove();
            break;
          }
        }
      });
      row.appendChild(btn);
    }
  }

  function updateRelayRow(msgId, relayers, final) {
    // Update the stored message object so re-renders keep state
    for (const [, ch] of channels) {
      const m = ch.messages.find(x => x.id === msgId);
      if (m) { m.relayers = relayers; m.relayFinal = final; break; }
    }
    const row = relayRows.get(msgId);
    if (row) renderRelayRow(row, relayers, final);
  }

  // ── Node store & rendering ────────────────────────────────────────────────
  const nodeMap  = new Map(); // key -> node data
  const nodesEl  = document.getElementById("nodes-list");

  function snrClass(snr) {
    if (snr == null) return "";
    if (snr >= -7)  return "snr-good";
    if (snr >= -12) return "snr-ok";
    return "snr-poor";
  }

  function fmtAgo(unix) {
    const s = Math.floor(Date.now() / 1000) - unix;
    if (s < 60)   return `${s}s ago`;
    if (s < 3600) return `${Math.floor(s/60)}m ago`;
    return `${Math.floor(s/3600)}h ago`;
  }

  function buildSparkline(buckets) {
    if (!buckets || buckets.length === 0) return "";
    const W = 120, H = 28, PAD = 2;
    const max = Math.max(...buckets, 1);
    const n   = buckets.length;
    const pts = buckets.map((v, i) => {
      const x = PAD + (i / (n - 1)) * (W - PAD * 2);
      const y = H - PAD - ((v / max) * (H - PAD * 2));
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    });
    return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"
      style="display:block;margin:4px 0 2px"
      xmlns="http://www.w3.org/2000/svg">
      <polyline points="${pts.join(" ")}"
        fill="none" stroke="#4caf88" stroke-width="1.5"
        stroke-linejoin="round" stroke-linecap="round"/>
    </svg>`;
  }

  function renderNodes() {
    if (nodeMap.size === 0) {
      nodesEl.innerHTML = '<p style="color:var(--text-muted);font-size:14px;text-align:center;margin-top:40px">Waiting for node advertisements…</p>';
      return;
    }
    const sorted = [...nodeMap.values()].sort((a, b) => b.last_seen - a.last_seen);
    nodesEl.innerHTML = "";
    for (const n of sorted) {
      const card = document.createElement("div");
      card.className = "node-card";

      const mapHref = (n.lat != null && n.lon != null)
        ? `https://www.google.com/maps?q=${n.lat},${n.lon}`
        : null;

      card.innerHTML = `
        <div class="node-name">${n.name}</div>
        <div class="node-stats">
          <div class="node-stat">
            <span class="node-stat-label">Avg SNR</span>
            <span class="node-stat-value ${snrClass(n.avg_snr)}">${n.avg_snr != null ? n.avg_snr + " dB" : "—"}</span>
          </div>
          <div class="node-stat">
            <span class="node-stat-label">Avg RSSI</span>
            <span class="node-stat-value">${n.avg_rssi != null ? n.avg_rssi + " dBm" : "—"}</span>
          </div>
          <div class="node-stat">
            <span class="node-stat-label">Messages</span>
            <span class="node-stat-value">${n.msg_count ?? 0}</span>
          </div>
        </div>
        ${buildSparkline(n.time_series)}
        <div class="node-footer">
          <span>${n.lat != null ? `${n.lat.toFixed(4)}, ${n.lon.toFixed(4)}` : "No position"}</span>
          ${mapHref ? `<a class="map-link" href="${mapHref}" target="_blank" rel="noopener">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            View on map</a>` : ""}
        </div>
        <div style="font-size:11px;color:var(--text-muted)">Last seen ${fmtAgo(n.last_seen)}</div>`;
      nodesEl.appendChild(card);
    }
  }

  function processNodeUpdate(n) {
    nodeMap.set(n.key, n);
    // Only re-render if the nodes page is active, to avoid wasted work
    if (document.getElementById("page-nodes").classList.contains("active")) {
      renderNodes();
    }
  }

  // ── Contacts page ────────────────────────────────────────────────────────
  const contactsMap    = new Map(); // key(12-char prefix) → contact data
  const pendingMap     = new Map(); // pubkey → pending contact data
  const contactsListEl = document.getElementById("contacts-list");
  const sortSelect     = document.getElementById("contacts-sort");
  const filterType     = document.getElementById("filter-type");
  const filterHops     = document.getElementById("filter-hops");
  const filterSeen     = document.getElementById("filter-seen");
  const filterChat     = document.getElementById("filter-chat");
  const autoaddToggle      = document.getElementById("autoadd-toggle");
  const purgeBtn           = document.getElementById("purge-btn");
  const pendingScrollEl    = document.getElementById("pending-scroll");
  const pendingCountLabel  = document.getElementById("pending-count-label");
  const contactsCountLabel = document.getElementById("contacts-count-label");

  autoaddToggle.addEventListener("change", () => {
    ws && ws.send(JSON.stringify({ type: "set_autoadd", value: autoaddToggle.checked ? 1 : 0 }));
  });

  purgeBtn.addEventListener("click", () => {
    if (confirm("Remove ALL contacts from this MeshCore device? This cannot be undone.")) {
      ws && ws.send(JSON.stringify({ type: "purge_contacts" }));
    }
  });

  // ── Smart-add helpers ────────────────────────────────────────────────────
  function getPathHashes() {
    const hashes = new Set();
    for (const [, ch] of channels) {
      for (const msg of ch.messages) {
        if (msg.path) {
          for (const node of msg.path) {
            if (node.hash) hashes.add(node.hash.toLowerCase());
          }
        }
      }
    }
    return hashes;
  }

  function getChatSenderNames() {
    const names = new Set();
    for (const [, ch] of channels) {
      for (const msg of ch.messages) {
        if (!msg.own && msg.sender) names.add(msg.sender.toLowerCase());
      }
    }
    return names;
  }

  function matchReasons(c, nodeKeys, pathHashes, chatNames) {
    // nodeKeys: Set of nodeMap keys (short hex), pathHashes: Set, chatNames: Set
    const pubkey = (c.pubkey || "").toLowerCase();
    const reasons = [];
    if (document.getElementById("auto-nodes").checked && c.node_type === 1) {
      for (const k of nodeKeys) {
        if (pubkey.startsWith(k.toLowerCase())) { reasons.push("in nodes"); break; }
      }
    }
    if (document.getElementById("auto-paths").checked && c.node_type === 1) {
      for (const h of pathHashes) {
        if (pubkey.startsWith(h)) { reasons.push("in paths"); break; }
      }
    }
    if (document.getElementById("auto-chatters").checked) {
      if (chatNames.has((c.name || "").toLowerCase())) reasons.push("seen chatting");
    }
    return reasons;
  }

  function updatePendingBadge() {
    const count = pendingMap.size;
    const navBtn = document.getElementById("nav-pending");
    if (!navBtn) return;
    let badge = navBtn.querySelector(".ch-badge");
    if (count > 0) {
      if (!badge) {
        badge = document.createElement("span");
        badge.className = "ch-badge";
        navBtn.appendChild(badge);
      }
      badge.textContent = count;
    } else if (badge) {
      badge.remove();
    }
    if (pendingCountLabel) {
      pendingCountLabel.textContent = count > 0 ? `${count} pending` : "";
    }
  }

  function renderPending() {
    pendingScrollEl.innerHTML = "";
    if (pendingMap.size === 0) {
      const empty = document.createElement("p");
      empty.style.cssText = "color:var(--text-muted);font-size:14px;text-align:center;margin-top:40px";
      empty.textContent = "No pending contacts";
      pendingScrollEl.appendChild(empty);
      return;
    }

    // Pre-compute sets once for the whole render pass
    const nodeKeys   = new Set(nodeMap.keys());
    const pathHashes = getPathHashes();
    const chatNames  = getChatSenderNames();

    for (const c of pendingMap.values()) {
      const reasons = matchReasons(c, nodeKeys, pathHashes, chatNames);
      const card = document.createElement("div");
      card.className = "pending-card" + (reasons.length ? " matched" : "");

      const avatar = document.createElement("div");
      avatar.className = "contact-avatar";
      avatar.style.cssText = `width:32px;height:32px;font-size:13px;color:${senderColour(c.name)}`;
      avatar.textContent = c.name.charAt(0).toUpperCase();
      card.appendChild(avatar);

      const info = document.createElement("div");
      info.style.cssText = "flex:1;min-width:0";
      const nameEl = document.createElement("div");
      nameEl.className = "pending-name";
      nameEl.textContent = c.name;
      info.appendChild(nameEl);
      const metaEl = document.createElement("div");
      metaEl.className = "pending-meta";
      const parts = [c.node_type_name || "Unknown"];
      if (c.out_path_len != null) parts.push(c.out_path_len === -1 ? "flood" : `${c.out_path_len} hops`);
      if (c.last_advert) parts.push("seen " + fmtAgo(c.last_advert));
      metaEl.textContent = parts.join(" · ");
      info.appendChild(metaEl);
      card.appendChild(info);

      if (reasons.length) {
        const tag = document.createElement("span");
        tag.className = "pending-match-tag";
        tag.textContent = reasons.join(", ");
        card.appendChild(tag);
      }

      const addBtn = document.createElement("button");
      addBtn.className = "add-btn";
      addBtn.textContent = "Add";
      addBtn.addEventListener("click", () => {
        ws && ws.send(JSON.stringify({ type: "add_contact", pubkey: c.pubkey }));
        addBtn.disabled = true;
        addBtn.textContent = "Adding…";
      });
      card.appendChild(addBtn);
      pendingScrollEl.appendChild(card);
    }
  }

  function updateContactsCount() {
    if (contactsCountLabel) contactsCountLabel.textContent = `${contactsMap.size} contact${contactsMap.size !== 1 ? "s" : ""}`;
  }

  function processContactUpdate(c) {
    contactsMap.set(c.key, c);
    updateContactsCount();
    if (document.getElementById("page-contacts").classList.contains("active"))
      renderContacts();
  }

  function renderContacts() {
    const sortBy   = sortSelect.value;
    const typeVal  = filterType.value;
    const maxHops  = filterHops.value !== "" ? parseInt(filterHops.value) : null;
    const maxAge   = filterSeen.value !== "" ? parseInt(filterSeen.value) : null;
    const chatFilt = filterChat.value;
    const nowSec   = Math.floor(Date.now() / 1000);

    let items = [...contactsMap.values()];

    // Filters
    if (typeVal !== "") items = items.filter(c => String(c.node_type) === typeVal);
    if (maxHops !== null) items = items.filter(c => {
      const h = c.out_path_len;
      return h != null && h !== -1 && h <= maxHops;
    });
    if (maxAge !== null) items = items.filter(c =>
      c.last_advert != null && (nowSec - c.last_advert) <= maxAge
    );
    if (chatFilt === "yes") items = items.filter(c => (c.chat_count || 0) > 0);
    if (chatFilt === "no")  items = items.filter(c => (c.chat_count || 0) === 0);

    // Sort
    if (sortBy === "name") {
      items.sort((a, b) => (a.name || "").localeCompare(b.name || ""));
    } else if (sortBy === "last_advert") {
      items.sort((a, b) => (b.last_advert || 0) - (a.last_advert || 0));
    } else if (sortBy === "last_chat") {
      items.sort((a, b) => (b.last_chat || 0) - (a.last_chat || 0));
    } else if (sortBy === "chat_count") {
      items.sort((a, b) => (b.chat_count || 0) - (a.chat_count || 0));
    } else if (sortBy === "hops") {
      items.sort((a, b) => {
        const ha = a.out_path_len == null || a.out_path_len === -1 ? 999 : a.out_path_len;
        const hb = b.out_path_len == null || b.out_path_len === -1 ? 999 : b.out_path_len;
        return ha - hb;
      });
    }

    contactsListEl.innerHTML = "";
    if (items.length === 0) {
      contactsListEl.innerHTML = '<p id="contacts-empty">No contacts match the filter</p>';
      return;
    }

    for (const c of items) {
      const card = document.createElement("div");
      card.className = "contact-card";

      const avatar = document.createElement("div");
      avatar.className = "contact-avatar";
      avatar.style.color = senderColour(c.name);
      avatar.textContent = (c.name || "?").charAt(0).toUpperCase();
      card.appendChild(avatar);

      const body = document.createElement("div");
      body.className = "contact-body";

      const nameEl = document.createElement("div");
      nameEl.className = "contact-name";
      nameEl.textContent = c.name;
      body.appendChild(nameEl);

      const meta = document.createElement("div");
      meta.className = "contact-meta";

      if (c.node_type_name) {
        const typeChip = document.createElement("span");
        typeChip.className = "contact-chip" + (
          c.node_type === 1 ? " type-repeater" :
          c.node_type === 3 ? " type-gateway"  :
          c.node_type === 2 ? " type-room"     : ""
        );
        typeChip.textContent = c.node_type_name;
        meta.appendChild(typeChip);
      }

      const hopsChip = document.createElement("span");
      hopsChip.className = "contact-chip";
      if (c.out_path_len === -1)       hopsChip.textContent = "flood";
      else if (c.out_path_len != null) hopsChip.textContent = `${c.out_path_len} hop${c.out_path_len !== 1 ? "s" : ""}`;
      else                             hopsChip.textContent = "hops unknown";
      meta.appendChild(hopsChip);

      if (c.last_advert) {
        const seenChip = document.createElement("span");
        seenChip.className = "contact-chip";
        seenChip.textContent = "advert " + fmtAgo(c.last_advert);
        meta.appendChild(seenChip);
      }

      if (c.chat_count > 0) {
        const chatChip = document.createElement("span");
        chatChip.className = "contact-chip";
        chatChip.textContent = `${c.chat_count} msg${c.chat_count !== 1 ? "s" : ""}`;
        meta.appendChild(chatChip);
        if (c.last_chat) {
          const lastChatChip = document.createElement("span");
          lastChatChip.className = "contact-chip";
          lastChatChip.textContent = "chat " + fmtAgo(c.last_chat);
          meta.appendChild(lastChatChip);
        }
      }

      body.appendChild(meta);
      card.appendChild(body);

      if (c.lat != null && c.lon != null && (c.lat !== 0 || c.lon !== 0)) {
        const mapLink = document.createElement("a");
        mapLink.className = "contact-map";
        mapLink.href = `https://www.google.com/maps?q=${c.lat},${c.lon}`;
        mapLink.target = "_blank";
        mapLink.rel = "noopener";
        mapLink.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg> Map`;
        card.appendChild(mapLink);
      }

      contactsListEl.appendChild(card);
    }
  }

  [sortSelect, filterType, filterHops, filterSeen, filterChat].forEach(el =>
    el.addEventListener("change", renderContacts)
  );

  function sendSmartAddConfig() {
    if (!ws || !wsConnected) return;
    ws.send(JSON.stringify({
      type:     "set_smart_add",
      nodes:    document.getElementById("auto-nodes").checked,
      paths:    document.getElementById("auto-paths").checked,
      chatters: document.getElementById("auto-chatters").checked,
    }));
  }

  // When a smart-add checkbox is turned ON, scan existing pending and prompt
  ["auto-nodes", "auto-paths", "auto-chatters"].forEach(id => {
    document.getElementById(id).addEventListener("change", (e) => {
      sendSmartAddConfig();
      if (e.target.checked && pendingMap.size > 0) {
        const nodeKeys   = new Set(nodeMap.keys());
        const pathHashes = getPathHashes();
        const chatNames  = getChatSenderNames();
        const matched = [...pendingMap.values()].filter(
          c => matchReasons(c, nodeKeys, pathHashes, chatNames).length > 0
        );
        if (matched.length > 0 && ws && wsConnected) {
          if (confirm(`${matched.length} pending contact${matched.length !== 1 ? "s" : ""} match this filter. Add them now?`)) {
            for (const c of matched) {
              ws.send(JSON.stringify({ type: "add_contact", pubkey: c.pubkey }));
            }
          }
        }
      }
      renderPending();
    });
  });

  document.getElementById("add-matched-btn").addEventListener("click", () => {
    if (!ws || !wsConnected) return;
    const nodeKeys   = new Set(nodeMap.keys());
    const pathHashes = getPathHashes();
    const chatNames  = getChatSenderNames();
    const matched = [...pendingMap.values()].filter(
      c => matchReasons(c, nodeKeys, pathHashes, chatNames).length > 0
    );
    if (matched.length === 0) {
      alert("No pending contacts match the selected filters.");
      return;
    }
    if (confirm(`Add ${matched.length} matched contact${matched.length !== 1 ? "s" : ""}?`)) {
      for (const c of matched) {
        ws.send(JSON.stringify({ type: "add_contact", pubkey: c.pubkey }));
      }
    }
  });

  // ── DM / Chats ───────────────────────────────────────────────────────────
  const dmChats      = new Map(); // contact_key → {name, messages[], unread, lastTs}
  const chatsPageEl  = document.getElementById("page-chats");
  const dmPageEl     = document.getElementById("page-dm");
  const dmMessagesEl = document.getElementById("dm-messages");
  const dmContactEl  = document.getElementById("dm-contact-name");
  const dmInput      = document.getElementById("dm-input");
  const dmSendBtn    = document.getElementById("dm-send");
  const dmBackBtn    = document.getElementById("dm-back");
  let currentDmKey   = null;

  function getOrCreateDmChat(key, name) {
    if (!dmChats.has(key)) {
      dmChats.set(key, { name: name || key, messages: [], unread: 0, lastTs: 0 });
    } else if (name && name !== key) {
      dmChats.get(key).name = name;
    }
    return dmChats.get(key);
  }

  function processDm(msg) {
    const key  = msg.contact_key;
    const name = msg.contact_name || key;
    const chat = getOrCreateDmChat(key, name);
    // Deduplicate
    if (chat.messages.some(m => m.id === msg.id)) return;
    chat.messages.push(msg);
    chat.lastTs = Math.max(chat.lastTs, msg.timestamp);
    if (currentDmKey !== key) {
      chat.unread++;
      updateNavChatsUnread();
    }
    if (chatsPageEl.classList.contains("active")) renderChatsList();
    if (dmPageEl.classList.contains("active") && currentDmKey === key) appendDmBubble(msg);
  }

  function renderChatsList() {
    chatsPageEl.innerHTML = "";
    if (dmChats.size === 0) {
      const empty = document.createElement("p");
      empty.style.cssText = "color:var(--text-muted);font-size:14px;text-align:center;margin-top:40px";
      empty.textContent = "No direct messages yet";
      chatsPageEl.appendChild(empty);
      return;
    }
    const sorted = [...dmChats.entries()].sort((a, b) => b[1].lastTs - a[1].lastTs);
    for (const [key, chat] of sorted) {
      const last = chat.messages[chat.messages.length - 1];
      const item = document.createElement("div");
      item.className = "chat-item";

      const avatar = document.createElement("div");
      avatar.className = "chat-avatar";
      avatar.style.color = senderColour(chat.name);
      avatar.textContent = chat.name.charAt(0).toUpperCase();
      item.appendChild(avatar);

      const body = document.createElement("div");
      body.className = "chat-item-body";

      const hdr = document.createElement("div");
      hdr.className = "chat-item-header";
      const nameEl = document.createElement("span");
      nameEl.className = "chat-item-name";
      nameEl.textContent = chat.name;
      hdr.appendChild(nameEl);
      if (last) {
        const timeEl = document.createElement("span");
        timeEl.className = "chat-item-time";
        timeEl.textContent = fmtTime(last.timestamp);
        hdr.appendChild(timeEl);
      }
      body.appendChild(hdr);

      if (last) {
        const preview = document.createElement("div");
        preview.className = "chat-item-preview";
        preview.textContent = (last.own ? "You: " : "") + last.text;
        body.appendChild(preview);
      }
      item.appendChild(body);

      if (chat.unread > 0) {
        const badge = document.createElement("span");
        badge.className = "chat-unread";
        badge.textContent = chat.unread;
        item.appendChild(badge);
      }

      item.addEventListener("click", () => openDmThread(key));
      chatsPageEl.appendChild(item);
    }
  }

  function openDmThread(key) {
    const chat = dmChats.get(key);
    if (!chat) return;
    currentDmKey = key;
    chat.unread = 0;
    updateNavChatsUnread();
    if (chatsPageEl.classList.contains("active")) renderChatsList();

    dmContactEl.textContent = chat.name;
    dmMessagesEl.innerHTML = "";
    for (const msg of chat.messages) appendDmBubble(msg);
    dmMessagesEl.scrollTop = dmMessagesEl.scrollHeight;
    dmInput.disabled    = !wsConnected;
    dmSendBtn.disabled  = !wsConnected;

    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    dmPageEl.classList.add("active");
    document.querySelectorAll(".nav-item").forEach(b => b.classList.remove("active"));
    document.querySelector(".nav-item[data-page='chats']").classList.add("active");
  }

  function appendDmBubble(msg) {
    const row = document.createElement("div");
    row.className = msg.own ? "bubble-row own" : "bubble-row";

    if (!msg.own) {
      const senderDiv = document.createElement("div");
      senderDiv.className = "sender";
      senderDiv.textContent = msg.sender;
      senderDiv.style.color = senderColour(msg.sender);
      row.appendChild(senderDiv);
    }

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    const textSpan = renderText(msg.text);
    const timeSpan = document.createElement("span");
    timeSpan.className = "time";
    timeSpan.textContent = fmtTime(msg.timestamp);
    bubble.appendChild(textSpan);
    bubble.appendChild(timeSpan);
    row.appendChild(bubble);
    dmMessagesEl.appendChild(row);
  }

  function updateNavChatsUnread() {
    let total = 0;
    for (const chat of dmChats.values()) total += chat.unread;
    const navBtn = document.querySelector(".nav-item[data-page='chats']");
    if (!navBtn) return;
    let badge = navBtn.querySelector(".ch-badge");
    if (total > 0) {
      if (!badge) {
        badge = document.createElement("span");
        badge.className = "ch-badge";
        navBtn.appendChild(badge);
      }
      badge.textContent = total;
    } else if (badge) {
      badge.remove();
    }
  }

  dmBackBtn.addEventListener("click", () => {
    currentDmKey = null;
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    chatsPageEl.classList.add("active");
    document.querySelectorAll(".nav-item").forEach(b => b.classList.remove("active"));
    document.querySelector(".nav-item[data-page='chats']").classList.add("active");
    renderChatsList();
  });

  function sendDm() {
    const text = dmInput.value.trim();
    if (!text || !currentDmKey || !wsConnected || !ws) return;
    ws.send(JSON.stringify({ type: "send_dm", contact_key: currentDmKey, text }));
    dmInput.value = "";
  }

  dmSendBtn.addEventListener("click", sendDm);
  dmInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendDm(); }
  });

  // ── WebSocket ────────────────────────────────────────────────────────────
  const WS_URL = `ws://${location.host}/ws`;
  let ws = null;
  let reconnectDelay = 1000;

  function setStatus(state, label) {
    statusEl.className = state;
    statusEl.textContent = label;
  }

  function connect() {
    setStatus("reconnecting", "Connecting\u2026");
    ws = new WebSocket(WS_URL);

    ws.addEventListener("open", () => {
      setStatus("connected", "Connected");
      reconnectDelay = 1000;
      wsConnected = true;
      updateCompose();
      if (currentDmKey) { dmInput.disabled = false; dmSendBtn.disabled = false; }
    });

    ws.addEventListener("message", (evt) => {
      let packet;
      try { packet = JSON.parse(evt.data); } catch { return; }
      if (packet.type === "history") {
        const sorted = [...packet.messages].sort((a, b) => a.timestamp - b.timestamp);
        sorted.forEach(processMessage);
      } else if (packet.type === "message") {
        processMessage(packet);
      } else if (packet.type === "relay_update") {
        updateRelayRow(packet.msg_id, packet.relayers, packet.final);
      } else if (packet.type === "neighbor_update") {
        processNodeUpdate(packet);
      } else if (packet.type === "neighbors_snapshot") {
        packet.neighbors.forEach(processNodeUpdate);
      } else if (packet.type === "dm") {
        processDm(packet);
      } else if (packet.type === "dm_history") {
        packet.messages.forEach(processDm);
      } else if (packet.type === "contact_update") {
        processContactUpdate(packet);
      } else if (packet.type === "contacts_snapshot") {
        packet.contacts.forEach(processContactUpdate);
      } else if (packet.type === "contacts_cleared") {
        contactsMap.clear();
        updateContactsCount();
        if (document.getElementById("page-contacts").classList.contains("active")) renderContacts();
      } else if (packet.type === "autoadd_config") {
        autoaddToggle.checked = packet.value > 0;
      } else if (packet.type === "smart_add_config") {
        document.getElementById("auto-nodes").checked    = !!packet.config.nodes;
        document.getElementById("auto-paths").checked    = !!packet.config.paths;
        document.getElementById("auto-chatters").checked = !!packet.config.chatters;
        if (document.getElementById("page-pending").classList.contains("active")) renderPending();
      } else if (packet.type === "pending_contact") {
        pendingMap.set(packet.contact.pubkey, packet.contact);
        updatePendingBadge();
        if (document.getElementById("page-pending").classList.contains("active")) renderPending();
      } else if (packet.type === "pending_contacts_snapshot") {
        packet.contacts.forEach(c => pendingMap.set(c.pubkey, c));
        updatePendingBadge();
        if (document.getElementById("page-pending").classList.contains("active")) renderPending();
      } else if (packet.type === "pending_contact_removed") {
        pendingMap.delete(packet.pubkey);
        updatePendingBadge();
        if (document.getElementById("page-pending").classList.contains("active")) renderPending();
      } else if (packet.type === "contact_removed") {
        // Remove by 12-char key prefix
        for (const [k] of contactsMap) { if (k === packet.pubkey) contactsMap.delete(k); }
        updateContactsCount();
        if (document.getElementById("page-contacts").classList.contains("active")) renderContacts();
      }
    });

    ws.addEventListener("close", () => {
      setStatus("disconnected", "Disconnected");
      wsConnected = false;
      updateCompose();
      dmInput.disabled = true; dmSendBtn.disabled = true;
      ws = null;
      setTimeout(connect, reconnectDelay);
      reconnectDelay = Math.min(reconnectDelay * 2, 16000);
    });

    ws.addEventListener("error", () => ws.close());
  }

  // Initial empty state
  renderMessages();
  connect();
</script>
</body>
</html>
