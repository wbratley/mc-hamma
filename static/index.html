<script>
  const statusEl   = document.getElementById("status");
  const messagesEl = document.getElementById("messages");
  const channelBtn = document.getElementById("channel-btn");
  const dropdown   = document.getElementById("channel-dropdown");
  const msgInput   = document.getElementById("msg-input");
  const sendBtn    = document.getElementById("send-btn");

  // ── Colour palette ───────────────────────────────────────────────────────
  const COLOURS = [
    "#6fa8ff", "#ff7e7e", "#6fcf97", "#f2c94c",
    "#bb86fc", "#56ccf2", "#f2994a", "#eb5757",
  ];

  function senderColour(name, key) {
    const src = key || name;
    let h = 0;
    for (let i = 0; i < src.length; i++) h = (h * 31 + src.charCodeAt(i)) >>> 0;
    return COLOURS[h % COLOURS.length];
  }

  // ── Formatting ───────────────────────────────────────────────────────────
  function fmtTime(unix) {
    return new Date(unix * 1000).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", hour12: false });
  }

  function fmtDate(unix) {
    const d = new Date(unix * 1000), today = new Date(), yest = new Date(today);
    yest.setDate(today.getDate() - 1);
    if (d.toDateString() === today.toDateString()) return "Today";
    if (d.toDateString() === yest.toDateString()) return "Yesterday";
    return d.toLocaleDateString([], { weekday: "long", month: "short", day: "numeric" });
  }

  // ── Unread persistence (localStorage) ───────────────────────────────────
  // Stores the highest message id seen per channel/DM when the user last
  // viewed it.  Messages with id <= that value are considered already read.
  function _lrStore() {
    try { return JSON.parse(localStorage.getItem("lastReadIds") || "{}"); }
    catch { return {}; }
  }
  function getLastReadId(key) { return _lrStore()[key] || 0; }
  function setLastReadId(key, id) {
    if (!id) return;
    const s = _lrStore(); s[key] = id;
    try { localStorage.setItem("lastReadIds", JSON.stringify(s)); } catch {}
  }
  function maxMsgId(msgs) {
    return msgs.reduce((m, x) => Math.max(m, x.id || 0), 0);
  }

  // ── Channel store ────────────────────────────────────────────────────────
  // Map<channel_idx, { name, messages: [], unread: 0 }>
  const channels = new Map();
  let currentIdx = null;
  const seenIds  = new Set();
  let atBottom   = true;
  const scrollBottomBtn = document.getElementById("scroll-bottom-btn");

  messagesEl.addEventListener("scroll", () => {
    atBottom = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 60;
    scrollBottomBtn.classList.toggle("visible", !atBottom);
    // Remove the read marker once the user scrolls to the bottom
    if (atBottom) {
      const marker = messagesEl.querySelector(".read-marker");
      if (marker) marker.remove();
    }
  });

  scrollBottomBtn.addEventListener("click", () => {
    messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: "smooth" });
  });

  function getOrCreateChannel(idx, name) {
    if (!channels.has(idx)) {
      channels.set(idx, { name: name || `ch${idx}`, messages: [], unread: 0 });
    } else if (name) {
      channels.get(idx).name = name;
    }
    return channels.get(idx);
  }

  // ── Channel picker UI ────────────────────────────────────────────────────
  function renderDropdown() {
    dropdown.innerHTML = "";
    if (channels.size === 0) {
      dropdown.innerHTML = '<div class="ch-empty">No channels yet…</div>';
      return;
    }
    const sorted = [...channels.entries()].sort((a, b) => a[0] - b[0]);
    for (const [idx, ch] of sorted) {
      const btn = document.createElement("button");
      btn.className = "ch-item" + (idx === currentIdx ? " active" : "");
      btn.setAttribute("role", "option");
      btn.setAttribute("aria-selected", idx === currentIdx);

      const nameEl = document.createElement("span");
      nameEl.className = "ch-name";
      nameEl.textContent = ch.name;
      btn.appendChild(nameEl);

      if (ch.unread > 0) {
        const badge = document.createElement("span");
        badge.className = "ch-badge";
        badge.textContent = ch.unread;
        btn.appendChild(badge);
      }

      btn.addEventListener("click", () => selectChannel(idx));
      dropdown.appendChild(btn);
    }
  }

  function updateChannelBtn() {
    const label = channelBtn.querySelector(".btn-label");
    if (currentIdx === null) {
      label.textContent = "Select channel…";
    } else {
      const ch = channels.get(currentIdx);
      label.textContent = ch ? ch.name : `ch${currentIdx}`;
    }
  }

  // Toggle dropdown open/close
  channelBtn.addEventListener("click", () => {
    const open = dropdown.classList.toggle("open");
    channelBtn.classList.toggle("open", open);
    channelBtn.setAttribute("aria-expanded", open);
    if (open) renderDropdown();
  });

  // Close dropdown on outside click
  document.addEventListener("click", (e) => {
    if (!channelBtn.contains(e.target) && !dropdown.contains(e.target)) {
      dropdown.classList.remove("open");
      channelBtn.classList.remove("open");
      channelBtn.setAttribute("aria-expanded", false);
    }
  });

  // ── Select a channel ─────────────────────────────────────────────────────
  function selectChannel(idx) {
    currentIdx = idx;
    const ch = channels.get(idx);
    // Capture the read position BEFORE marking everything read
    const lastReadId = ch ? getLastReadId("ch_" + idx) : null;
    if (ch) {
      ch.unread = 0;
      setLastReadId("ch_" + idx, maxMsgId(ch.messages));
    }
    dropdown.classList.remove("open");
    channelBtn.classList.remove("open");
    channelBtn.setAttribute("aria-expanded", false);
    updateChannelBtn();
    renderDropdown();
    updateBtnBadge();
    renderMessages(lastReadId);
    updateCompose();
    // Always switch back to the chat page
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById("page-chat").classList.add("active");
    document.querySelectorAll(".nav-item").forEach(b => {
      b.classList.toggle("active", b.dataset.page === "chat");
    });
  }

  // ── Render all messages for the selected channel ─────────────────────────
  function renderMessages(lastReadId = null) {
    messagesEl.innerHTML = "";

    if (currentIdx === null) {
      messagesEl.appendChild(makeEmpty("Select a channel above to view messages"));
      return;
    }

    const ch = channels.get(currentIdx);
    if (!ch || ch.messages.length === 0) {
      messagesEl.appendChild(makeEmpty("No messages yet"));
      return;
    }

    // Determine if there are truly unread messages to mark
    const hasUnread = lastReadId != null && ch.messages.some(m => (m.id || 0) > lastReadId);
    let markerEl = null;

    let lastDate = null;
    for (const msg of ch.messages) {
      // Insert read marker just before the first unread message
      if (hasUnread && markerEl === null && (msg.id || 0) > lastReadId) {
        markerEl = document.createElement("div");
        markerEl.className = "read-marker";
        markerEl.textContent = "New messages";
        messagesEl.appendChild(markerEl);
      }
      const dl = fmtDate(msg.timestamp);
      if (dl !== lastDate) {
        lastDate = dl;
        const sep = document.createElement("div");
        sep.className = "date-sep";
        sep.textContent = dl;
        messagesEl.appendChild(sep);
      }
      messagesEl.appendChild(buildBubble(msg));
    }

    if (markerEl) {
      // Scroll so the marker appears near the top of the visible area.
      // Use scrollIntoView for reliable cross-browser behaviour — it only
      // affects #messages because body/html both have overflow:hidden.
      requestAnimationFrame(() => {
        markerEl.scrollIntoView({ block: "start", behavior: "instant" });
        // Nudge up slightly so the marker isn't flush with the edge.
        messagesEl.scrollTop = Math.max(0, messagesEl.scrollTop - 8);
      });
    } else {
      messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: "instant" });
    }
  }

  function makeEmpty(text) {
    const el = document.createElement("div");
    el.className = "msg-empty";
    el.innerHTML = `
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <p>${text}</p>`;
    return el;
  }

  // ── Path popup (full chain: sender → relays → You) ──────────────────────
  // Used from chat hop badge, chat map-pin area, and graph info panel.
  // msg: the full message object (needs .sender, .path, optionally .sender_hash)
  let _hopPopup = null;

  function showPathPopup(event, msg) {
    dismissHopPopup();

    const pop = document.createElement("div");
    pop.className = "hop-popup";

    const title = document.createElement("div");
    title.className = "pop-title";
    title.textContent = "Full path";
    pop.appendChild(title);

    // Build full chain: sender → relay hops → You
    const entries = [];
    entries.push({ label: msg.sender, role: "sender" });
    for (const node of (msg.path || [])) {
      const name = (typeof node === "object") ? (node.name || node.hash?.slice(0, 8) || "?") : String(node).slice(0, 8);
      entries.push({ label: name, role: "relay" });
    }
    entries.push({ label: "You", role: "self" });

    entries.forEach((entry, i) => {
      const row = document.createElement("div");
      row.className = "pop-node";

      // Arrow connector between nodes
      if (i > 0) {
        const arrow = document.createElement("div");
        arrow.className = "pop-node";
        arrow.style.cssText = "color:var(--text-muted);font-size:10px;padding:0 2px";
        arrow.textContent = "▾";
        pop.appendChild(arrow);
      }

      const idx = document.createElement("span");
      idx.className = "pop-node-idx";
      idx.textContent = i === 0 ? "↑" : i === entries.length - 1 ? "↓" : `${i}.`;
      row.appendChild(idx);

      const label = document.createElement("span");
      label.className = entry.role === "relay" ? "pop-node-hash" : "pop-node-name";
      if (entry.role === "sender") label.style.color = "var(--accent)";
      if (entry.role === "self")   label.style.color = "var(--status-ok)";
      label.textContent = entry.label;
      row.appendChild(label);
      pop.appendChild(row);
    });

    document.body.appendChild(pop);
    const x = Math.min(event.clientX + 8, window.innerWidth  - pop.offsetWidth  - 12);
    const y = Math.min(event.clientY + 8, window.innerHeight - pop.offsetHeight - 12);
    pop.style.left = `${x}px`;
    pop.style.top  = `${y}px`;
    _hopPopup = pop;

    setTimeout(() => {
      document.addEventListener("click", dismissHopPopup, { once: true });
    }, 0);
  }

  function dismissHopPopup() {
    if (_hopPopup) { _hopPopup.remove(); _hopPopup = null; }
  }

  // Render text with @[Name] patterns replaced by styled mention pills
  function renderText(text) {
    const span = document.createElement("span");
    span.className = "text";
    const parts = text.split(/(@\[[^\]]+\])/);
    for (const part of parts) {
      const m = part.match(/^@\[([^\]]+)\]$/);
      if (m) {
        const pill = document.createElement("span");
        pill.className = "mention";
        pill.textContent = "@" + m[1];
        span.appendChild(pill);
      } else if (part) {
        span.appendChild(document.createTextNode(part));
      }
    }
    return span;
  }

  // ── Reply state ──────────────────────────────────────────────────────────
  const replyBanner  = document.getElementById("reply-banner");
  const replyLabel   = document.getElementById("reply-label");
  const replyDismiss = document.getElementById("reply-dismiss");
  let replyingTo = null;

  function setReplyTo(sender) {
    replyingTo = sender;
    replyLabel.textContent = `Replying to ${sender}`;
    replyBanner.style.display = "flex";
    msgInput.focus();
  }

  function clearReply() {
    replyingTo = null;
    replyBanner.style.display = "none";
  }

  replyDismiss.addEventListener("click", clearReply);

  // ── Compose bar ─────────────────────────────────────────────────────────
  let wsConnected = false;

  const scopeSelect = document.getElementById("scope-select");

  function updateCompose() {
    const enabled = wsConnected && currentIdx !== null;
    msgInput.disabled    = !enabled;
    sendBtn.disabled     = !enabled;
    scopeSelect.disabled = !enabled;
    msgInput.placeholder = !wsConnected ? "Not connected…"
                         : currentIdx === null ? "Select a channel first…"
                         : "Message…";
  }

  async function loadScopes() {
    try {
      const res = await fetch("/api/scopes");
      if (!res.ok) return;
      const data = await res.json();
      const scopes = data.scopes || ["*"];
      scopeSelect.innerHTML = "";
      for (const s of scopes) {
        const opt = document.createElement("option");
        opt.value = s;
        opt.textContent = s === "*" ? "Global" : s;
        scopeSelect.appendChild(opt);
      }
    } catch (_) { /* keep default Global option */ }
  }

  loadScopes();

  fetch("/api/version")
    .then(r => r.ok ? r.json() : null)
    .then(d => { if (d?.commit) document.getElementById("version-badge").textContent = d.commit; })
    .catch(() => {});

  function sendMessage() {
    const raw = msgInput.value.trim();
    if (!raw || !wsConnected || currentIdx === null || !ws) return;
    const text  = replyingTo ? `@[${replyingTo}] ${raw}` : raw;
    const scope = document.getElementById("scope-select")?.value || "*";
    ws.send(JSON.stringify({ type: "send", channel_idx: currentIdx, text, scope }));
    msgInput.value = "";
    clearReply();
  }

  sendBtn.addEventListener("click", sendMessage);
  msgInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function buildBubble(msg) {
    const row = document.createElement("div");
    row.className = msg.own ? "bubble-row own" : "bubble-row";

    const senderDiv = document.createElement("div");
    senderDiv.className = "sender";

    const senderName = document.createElement("span");
    senderName.textContent = msg.sender;
    senderName.style.color = senderColour(msg.sender, msg.sender_hash);
    senderDiv.appendChild(senderName);

    if (!msg.own && msg.sender_hash) {
      const pkPrev = document.createElement("span");
      pkPrev.className = "pubkey-preview";
      pkPrev.textContent = msg.sender_hash.slice(0, 4);
      pkPrev.title = msg.sender_hash;
      senderDiv.appendChild(pkPrev);
    }

    if (!msg.own) {
      const hasPath = msg.hops > 0 && msg.path && msg.path.length > 0;
      const hasLoc  = msg.sender_lat != null && msg.sender_lon != null &&
                      !(msg.sender_lat === 0 && msg.sender_lon === 0);

      if (hasPath) {
        // Hop count: click to show full path popup
        const badge = document.createElement("span");
        badge.className = "hop-badge";
        badge.textContent = `${msg.hops} hop${msg.hops !== 1 ? "s" : ""}`;
        badge.title = "Click to see full path";
        badge.addEventListener("click", (e) => { e.stopPropagation(); showPathPopup(e, msg); });
        senderDiv.appendChild(badge);
      } else {
        const direct = document.createElement("span");
        direct.className = "direct-badge";
        direct.textContent = "direct" + (msg.snr != null ? ` · ${msg.snr} dB` : "");
        senderDiv.appendChild(direct);
      }

      // Map-pin button: always separate from the hop count — show route on map
      if (hasPath || hasLoc) {
        const mapBtn = document.createElement("button");
        mapBtn.className = "sender-map-btn";
        mapBtn.title = hasLoc
          ? `${msg.sender_lat.toFixed(4)}, ${msg.sender_lon.toFixed(4)} — show on map`
          : "Show route on map";
        mapBtn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`;
        mapBtn.addEventListener("click", (e) => { e.stopPropagation(); showOnMap(msg); });
        senderDiv.appendChild(mapBtn);
      }
    }

    if (msg.scope) {
      const scopeBadge = document.createElement("span");
      scopeBadge.className = "scope-badge";
      scopeBadge.textContent = msg.scope;
      scopeBadge.title = `Scoped to region: ${msg.scope}`;
      senderDiv.appendChild(scopeBadge);
    }

    row.appendChild(senderDiv);

    const bubble = document.createElement("div");
    bubble.className = "bubble";

    const textSpan = renderText(msg.text);

    const timeSpan = document.createElement("span");
    timeSpan.className = "time";
    timeSpan.textContent = fmtTime(msg.timestamp);

    bubble.appendChild(textSpan);
    bubble.appendChild(timeSpan);
    row.appendChild(bubble);

    // Tap to reply — skip own messages
    if (!msg.own) {
      row.style.cursor = "pointer";
      row.addEventListener("click", () => setReplyTo(msg.sender));
    }

    if (msg.own) {
      const relayRow = document.createElement("div");
      relayRow.className = "relay-row";
      relayRows.set(msg.id, relayRow);
      msg.relayRowRef = relayRow;
      // Restore relay state if already known (e.g. after channel switch re-render)
      renderRelayRow(relayRow, msg.relayers || [], msg.relayFinal || false);
      row.appendChild(relayRow);
    }

    return row;
  }

  // ── Process an incoming message ──────────────────────────────────────────
  function processMessage(msg) {
    // Skip system messages and anything without a real channel
    if (msg.channel_idx == null || msg.channel_name === "system") return;
    if (seenIds.has(msg.id)) return;
    seenIds.add(msg.id);

    const ch = getOrCreateChannel(msg.channel_idx, msg.channel_name);
    ch.messages.push(msg);
    if (ch.messages.length > 1000) ch.messages.splice(0, ch.messages.length - 1000);

    const chatPageVisible = document.getElementById("page-chat").classList.contains("active");
    if (msg.channel_idx === currentIdx && chatPageVisible) {
      // Append to live view
      const dl = fmtDate(msg.timestamp);
      const seps = messagesEl.querySelectorAll(".date-sep");
      const lastSep = seps[seps.length - 1];
      if (!lastSep || lastSep.textContent !== dl) {
        const sep = document.createElement("div");
        sep.className = "date-sep";
        sep.textContent = dl;
        messagesEl.appendChild(sep);
      }
      messagesEl.appendChild(buildBubble(msg));
      if (atBottom) messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: "instant" });
      // Mark this message as read immediately (we're looking at it)
      setLastReadId("ch_" + msg.channel_idx, msg.id);
    } else {
      // Background channel (or user is on a different nav page): only count as
      // unread if newer than last read point
      if ((msg.id || 0) > getLastReadId("ch_" + msg.channel_idx)) ch.unread++;
      // If nothing selected yet, auto-select this channel
      if (currentIdx === null) {
        selectChannel(msg.channel_idx);
        return;
      }
    }

    updateChannelBtn();
    // Re-render dropdown to update unread badges (only if open)
    if (dropdown.classList.contains("open")) renderDropdown();
    // Update btn badge indicator: show total unread across non-selected channels
    updateBtnBadge();

    // Keep latest message timestamp up to date (used as reference for age filter)
    if (msg.timestamp && msg.timestamp > _latestMsgTimestamp) {
      _latestMsgTimestamp = msg.timestamp;
    }

    // Track shortest path per sender node
    if (!msg.own && msg.sender_hash) {
      const h = msg.sender_hash;
      const hops = msg.hops ?? (msg.path || []).length;
      const existing = nodeShortestPath.get(h);
      if (!existing || hops < existing.hops) {
        const pathHashes = (msg.path || []).map(p => (typeof p === "object" ? p.hash : p));
        nodeShortestPath.set(h, { hops, senderHash: h, sender: msg.sender, path: pathHashes, msg });
        if (document.getElementById("page-rankings").classList.contains("active")) renderRankings();
      }
    }

    // Graph route highlight + persistent info panel — skip if path is locked
    if (!msg.own && !_pathLocked) {
      _lastHighlightedMsg = msg;
      const pathHashes = (msg.path || []).map(h => (typeof h === "object" ? h.hash : h));
      if (graphInited) highlightMessageRoute(msg.sender_hash || "", pathHashes);
      showGraphInfo(msg);
    }

    if (document.getElementById("page-rankings").classList.contains("active")) {
      renderRankings();
    }
  }

  // Show a total unread dot on the button when dropdown is closed
  function updateBtnBadge() {
    let total = 0;
    for (const [idx, ch] of channels) {
      if (idx !== currentIdx) total += ch.unread;
    }
    let badge = channelBtn.querySelector(".ch-badge");
    if (total > 0) {
      if (!badge) {
        badge = document.createElement("span");
        badge.className = "ch-badge";
        channelBtn.insertBefore(badge, channelBtn.querySelector(".btn-arrow"));
      }
      badge.textContent = total;
    } else if (badge) {
      badge.remove();
    }
  }

  // ── Burger / page nav ────────────────────────────────────────────────────
  const burgerBtn = document.getElementById("burger-btn");
  const navMenu   = document.getElementById("nav-menu");

  burgerBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    navMenu.classList.toggle("open");
  });
  document.addEventListener("click", (e) => {
    if (!navMenu.contains(e.target) && e.target !== burgerBtn)
      navMenu.classList.remove("open");
  });

  navMenu.querySelectorAll(".nav-item").forEach(btn => {
    btn.addEventListener("click", () => {
      navMenu.classList.remove("open");
      const page = btn.dataset.page;
      if (page !== "graph") _graphPageOpen = false; // leaving graph page
      document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
      document.getElementById("page-" + page).classList.add("active");
      navMenu.querySelectorAll(".nav-item").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      if (page === "chat") {
        if (currentIdx !== null) {
          // Re-render with the unread marker so new messages that arrived while
          // on another tab are shown, then mark everything as read.
          const ch = channels.get(currentIdx);
          const lastReadId = ch ? getLastReadId("ch_" + currentIdx) : null;
          if (ch) {
            ch.unread = 0;
            setLastReadId("ch_" + currentIdx, maxMsgId(ch.messages));
            renderDropdown();
            updateBtnBadge();
          }
          renderMessages(lastReadId);
        } else {
          messagesEl.scrollTop = messagesEl.scrollHeight;
        }
      }
      if (page === "chats") renderChatsList();
      if (page === "contacts") renderContacts();
      if (page === "pending") renderPending();
      if (page === "adverts") renderAdverts();
      if (page === "graph") {
        _graphPageOpen = true;
        // Double RAF: first frame applies display:flex, second has correct layout
        requestAnimationFrame(() => requestAnimationFrame(() => {
          if (!graphInited) {
            initGraphSvg();
            setGraphMapMode(true); // default to map on first open
          } else {
            updateGraphViz();
          }
          markGraphNodesRead();
        }));
      }
      if (page === "nodes") renderNodes();
      if (page === "rankings") renderRankings();
    });
  });

  // ── Relay tracking ───────────────────────────────────────────────────────
  const relayRows = new Map(); // msg_id -> relay-row DOM element

  function renderRelayRow(row, relayers, final) {
    row.innerHTML = "";
    if (!final && relayers.length === 0) {
      const s = document.createElement("span");
      s.className = "relay-label relay-waiting";
      s.textContent = "Listening for relays…";
      row.appendChild(s);
      return;
    }
    if (relayers.length > 0) {
      const lbl = document.createElement("span");
      lbl.className = "relay-label relay-ok";
      lbl.textContent = "↺";
      row.appendChild(lbl);
      for (const r of relayers) {
        const tag = document.createElement("span");
        tag.className = "relay-tag";
        tag.textContent = r.name;
        row.appendChild(tag);
      }
    } else if (final) {
      const lbl = document.createElement("span");
      lbl.className = "relay-label relay-none";
      lbl.textContent = "No relay heard";
      row.appendChild(lbl);
      const btn = document.createElement("button");
      btn.className = "retry-btn";
      btn.textContent = "Retry";
      btn.addEventListener("click", () => {
        for (const [, ch] of channels) {
          const m = ch.messages.find(x => x.relayRowRef === row);
          if (m && ws) {
            ws.send(JSON.stringify({ type: "send", channel_idx: m.channel_idx, text: m.text }));
            lbl.textContent = "Retrying…";
            btn.remove();
            break;
          }
        }
      });
      row.appendChild(btn);
    }
  }

  function updateRelayRow(msgId, relayers, final) {
    // Update the stored message object so re-renders keep state
    for (const [, ch] of channels) {
      const m = ch.messages.find(x => x.id === msgId);
      if (m) { m.relayers = relayers; m.relayFinal = final; break; }
    }
    const row = relayRows.get(msgId);
    if (row) renderRelayRow(row, relayers, final);
  }

  // ── Node store & rendering ────────────────────────────────────────────────
  const nodeMap  = new Map(); // key -> node data
  const nodesEl  = document.getElementById("nodes-list");

  function snrClass(snr) {
    if (snr == null) return "";
    if (snr >= -7)  return "snr-good";
    if (snr >= -12) return "snr-ok";
    return "snr-poor";
  }

  function fmtAgo(unix) {
    const s = Math.floor(Date.now() / 1000) - unix;
    if (s < 60)   return `${s}s ago`;
    if (s < 3600) return `${Math.floor(s/60)}m ago`;
    return `${Math.floor(s/3600)}h ago`;
  }

  function buildSparkline(buckets) {
    if (!buckets || buckets.length === 0) return "";
    const W = 120, H = 28, PAD = 2;
    const max = Math.max(...buckets, 1);
    const n   = buckets.length;
    const pts = buckets.map((v, i) => {
      const x = PAD + (i / (n - 1)) * (W - PAD * 2);
      const y = H - PAD - ((v / max) * (H - PAD * 2));
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    });
    return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"
      style="display:block;margin:4px 0 2px"
      xmlns="http://www.w3.org/2000/svg">
      <polyline points="${pts.join(" ")}"
        fill="none" stroke="#4caf88" stroke-width="1.5"
        stroke-linejoin="round" stroke-linecap="round"/>
    </svg>`;
  }

  function renderNodes() {
    if (nodeMap.size === 0) {
      nodesEl.innerHTML = '<p style="color:var(--text-muted);font-size:14px;text-align:center;margin-top:40px">Waiting for node advertisements…</p>';
      return;
    }
    const sorted = [...nodeMap.values()].sort((a, b) => b.last_seen - a.last_seen);
    nodesEl.innerHTML = "";
    for (const n of sorted) {
      const card = document.createElement("div");
      card.className = "node-card";

      const mapHref = (n.lat != null && n.lon != null)
        ? `https://www.google.com/maps?q=${n.lat},${n.lon}`
        : null;

      card.innerHTML = `
        <div class="node-name">${n.name}</div>
        <div class="node-stats">
          <div class="node-stat">
            <span class="node-stat-label">Avg SNR</span>
            <span class="node-stat-value ${snrClass(n.avg_snr)}">${n.avg_snr != null ? n.avg_snr + " dB" : "—"}</span>
          </div>
          <div class="node-stat">
            <span class="node-stat-label">Avg RSSI</span>
            <span class="node-stat-value">${n.avg_rssi != null ? n.avg_rssi + " dBm" : "—"}</span>
          </div>
          <div class="node-stat">
            <span class="node-stat-label">Messages</span>
            <span class="node-stat-value">${n.msg_count ?? 0}</span>
          </div>
        </div>
        ${buildSparkline(n.time_series)}
        <div class="node-footer">
          <span>${n.lat != null ? `${n.lat.toFixed(4)}, ${n.lon.toFixed(4)}` : "No position"}</span>
          ${mapHref ? `<a class="map-link" href="${mapHref}" target="_blank" rel="noopener">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            View on map</a>` : ""}
        </div>
        <div style="font-size:11px;color:var(--text-muted)">Last seen ${fmtAgo(n.last_seen)}</div>`;
      nodesEl.appendChild(card);
    }
  }

  function processNodeUpdate(n) {
    nodeMap.set(n.key, n);
    // Only re-render if the nodes page is active, to avoid wasted work
    if (document.getElementById("page-nodes").classList.contains("active")) {
      renderNodes();
    }
    if (document.getElementById("page-rankings").classList.contains("active")) {
      renderRankings();
    }
  }

  // ── Rankings page ─────────────────────────────────────────────────────────
  // Navigate to graph page and highlight a specific node by its hash
  function showNodeOnGraph(nodeId) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById("page-graph").classList.add("active");
    navMenu.querySelectorAll(".nav-item").forEach(b => b.classList.remove("active"));
    const graphBtn = document.querySelector(".nav-item[data-page='graph']");
    if (graphBtn) graphBtn.classList.add("active");
    navMenu.classList.remove("open");
    _graphPageOpen = true;
    _pathLocked = true;
    _highlightNodeId = nodeId;
    requestAnimationFrame(() => requestAnimationFrame(() => {
      if (!graphInited) initGraphSvg();
      else { updateGraphViz(); _applyNodeHighlight(); }
    }));
  }

  // Navigate to graph and highlight the shortest known path to a node
  function showShortestPath(senderHash) {
    const rec = nodeShortestPath.get(senderHash);
    if (!rec) { showNodeOnGraph(senderHash); return; }

    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById("page-graph").classList.add("active");
    navMenu.querySelectorAll(".nav-item").forEach(b => b.classList.remove("active"));
    const graphBtn = document.querySelector(".nav-item[data-page='graph']");
    if (graphBtn) graphBtn.classList.add("active");
    navMenu.classList.remove("open");
    _graphPageOpen = true;
    _pathLocked = true;
    _lastHighlightedMsg = rec.msg;

    requestAnimationFrame(() => requestAnimationFrame(() => {
      if (!graphInited) initGraphSvg();
      else updateGraphViz();
      setGraphMapMode(true);
      highlightMessageRoute(rec.senderHash, rec.path);
      updateSenderMarker(rec.msg);
      showGraphInfo(rec.msg, true);
      markGraphNodesRead();
    }));
  }

  function renderRankings() {
    const el = document.getElementById("rankings-content");
    if (!el) return;

    if (graphEdges.size === 0) {
      el.innerHTML = '<p id="rankings-empty" style="color:var(--text-muted);font-size:14px;text-align:center;margin-top:40px">No path data yet — rankings appear once messages are received.</p>';
      return;
    }

    // Build nodeHops via BFS from "self" through graphEdges.
    // graphEdges is populated from the snapshot so this works immediately on load.
    // A direct RF neighbour (1 edge from self) = 0 Meshtastic hops ("direct").
    const nodeHops = new Map(); // hash → min hops from self
    {
      // Build adjacency list
      const adj = new Map();
      for (const e of graphEdges.values()) {
        if (!adj.has(e.a)) adj.set(e.a, []);
        if (!adj.has(e.b)) adj.set(e.b, []);
        adj.get(e.a).push(e.b);
        adj.get(e.b).push(e.a);
      }
      // BFS: self starts at -1 so its direct neighbours get hops = 0
      const visited = new Set(["self"]);
      const queue = [["self", -1]];
      while (queue.length > 0) {
        const [curr, hops] = queue.shift();
        for (const nb of (adj.get(curr) || [])) {
          if (visited.has(nb) || nb === "self") continue;
          visited.add(nb);
          nodeHops.set(nb, hops + 1);
          queue.push([nb, hops + 1]);
        }
      }
    }

    // All rankings derive from graphEdges so they match the graph exactly.
    // Each edge has: { a, b, count (total path observations), strength, last_seen }
    const now6h = Date.now() / 1000 - 6 * 3600;

    // Per-node aggregates
    const nodeAgg = new Map(); // hash → { hash, name, totalObs, links, totalStrength, recentObs, recentLinks, minHops }
    for (const e of graphEdges.values()) {
      for (const h of [e.a, e.b]) {
        if (h === "self") continue;
        if (!nodeAgg.has(h)) {
          const gn = graphNodes.get(h);
          nodeAgg.set(h, {
            hash: h,
            name: (gn && gn.name) || h.slice(0, 8),
            node_type: gn ? gn.node_type : null,
            totalObs: 0,   // sum of edge counts (total path observations)
            links: 0,      // number of distinct edges
            totalStrength: 0,
            recentObs: 0,  // count of edges active in last 6h
            recentLinks: 0,
            minHops: nodeHops.has(h) ? nodeHops.get(h) : null,
          });
        }
        const rec = nodeAgg.get(h);
        rec.totalObs      += e.count;
        rec.links         += 1;
        rec.totalStrength += e.strength;
        if (e.last_seen >= now6h) rec.recentLinks++;
        // Edge count weighted by recency — approximate recent observations
        // by scaling count proportionally to strength vs baseline (1 obs = strength≈1)
        rec.recentObs += e.last_seen >= now6h ? e.count : 0;
      }
    }

    const aggArr = [...nodeAgg.values()];

    if (aggArr.length === 0) {
      el.innerHTML = '<p id="rankings-empty" style="color:var(--text-muted);font-size:14px;text-align:center;margin-top:40px">No node data yet.</p>';
      return;
    }

    // Top 10 by total path observations (sum of edge counts)
    const topObs = [...aggArr].sort((a, b) => b.totalObs - a.totalObs).slice(0, 10);
    // Top 10 by link count
    const topLinks = [...aggArr].sort((a, b) => b.links - a.links || b.totalStrength - a.totalStrength).slice(0, 10);
    // Top 10 by strength (sum across all edges — reflects how active links are in last 6h)
    const topStrength = [...aggArr].sort((a, b) => b.totalStrength - a.totalStrength).slice(0, 10);

    function typeBadge(nt) {
      if (nt === 1) return '';
      if (nt === 2) return ' <span style="font-size:10px;color:var(--text-muted)">[Room]</span>';
      if (nt === 3) return ' <span style="font-size:10px;color:var(--text-muted)">[GW]</span>';
      return '';
    }

    function mapBtn(hash) {
      return `<button class="rank-map-btn" onclick="showNodeOnGraph('${hash}')">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>map</button>`;
    }

    function buildTable(rows, columns) {
      if (rows.length === 0) return '<p class="rank-empty">No data</p>';
      const headers = columns.map(c => `<th>${c.label}</th>`).join("");
      const body = rows.map((r, i) => {
        const cells = columns.map(c => `<td class="${c.cls || ''}">${c.fn(r, i)}</td>`).join("");
        return `<tr>${cells}</tr>`;
      }).join("");
      return `<table class="rank-table"><thead><tr>${headers}</tr></thead><tbody>${body}</tbody></table>`;
    }

    function hopsLabel(h) { return h === 0 ? "direct" : h; }
    function hopsCell(r) {
      return r.minHops !== null ? hopsLabel(r.minHops) : '<span style="color:var(--text-muted)">—</span>';
    }

    // ── Closest chatters by hops — client nodes (node_type 0) sorted by BFS distance ───
    const closestNodes = [...nodeAgg.values()]
      .filter(r => r.minHops !== null && r.node_type === 0)
      .sort((a, b) => a.minHops - b.minHops || a.name.localeCompare(b.name))
      .slice(0, 10);

    // ── Closest repeaters by hops — repeater/gateway types only ─────────────
    const closestRepeaters = [...nodeAgg.values()]
      .filter(r => (r.node_type === 1 || r.node_type === 2 || r.node_type === 3) && r.minHops !== null)
      .sort((a, b) => a.minHops - b.minHops || a.name.localeCompare(b.name))
      .slice(0, 10);

    // ── Path-button helper ───────────────────────────────────────────────────
    function pathBtn(hash) {
      return `<button class="rank-map-btn" onclick="showShortestPath('${hash}')">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>path</button>`;
    }

    const sections = [];

    if (closestNodes.length > 0) {
      sections.push(`<div>
        <div class="rank-section-title">Closest chatters</div>
        ${buildTable(closestNodes, [
          { label: "#",     cls: "rank-num",   fn: (r, i) => i + 1 },
          { label: "Node",  cls: "rank-name",  fn: r => r.name + typeBadge(r.node_type) },
          { label: "Hops",  cls: "rank-count", fn: r => hopsLabel(r.minHops) },
          { label: "",      cls: "",           fn: r => mapBtn(r.hash) },
        ])}
      </div>`);
    }

    if (closestRepeaters.length > 0) {
      sections.push(`<div>
        <div class="rank-section-title">Closest repeaters by hops</div>
        ${buildTable(closestRepeaters, [
          { label: "#",     cls: "rank-num",   fn: (r, i) => i + 1 },
          { label: "Node",  cls: "rank-name",  fn: r => r.name + typeBadge(r.node_type) },
          { label: "Hops",  cls: "rank-count", fn: r => hopsLabel(r.minHops) },
          { label: "",      cls: "",           fn: r => mapBtn(r.hash) },
        ])}
      </div>`);
    }

    sections.push(`<div>
      <div class="rank-section-title">Top nodes by path observations</div>
      ${buildTable(topObs, [
        { label: "#",           cls: "rank-num",   fn: (r, i) => i + 1 },
        { label: "Node",        cls: "rank-name",  fn: r => r.name + typeBadge(r.node_type) },
        { label: "Hops",        cls: "rank-strength", fn: r => hopsCell(r) },
        { label: "Total obs",   cls: "rank-count", fn: r => r.totalObs },
        { label: "Links",       cls: "rank-strength", fn: r => r.links },
        { label: "",            cls: "",           fn: r => mapBtn(r.hash) },
      ])}
    </div>`);

    sections.push(`<div>
      <div class="rank-section-title">Top nodes by link count</div>
      ${buildTable(topLinks, [
        { label: "#",           cls: "rank-num",   fn: (r, i) => i + 1 },
        { label: "Node",        cls: "rank-name",  fn: r => r.name + typeBadge(r.node_type) },
        { label: "Hops",        cls: "rank-strength", fn: r => hopsCell(r) },
        { label: "Links",       cls: "rank-count", fn: r => r.links },
        { label: "Active (6h)", cls: "rank-strength", fn: r => r.recentLinks },
        { label: "",            cls: "",           fn: r => mapBtn(r.hash) },
      ])}
    </div>`);

    sections.push(`<div>
      <div class="rank-section-title">Strongest nodes (link strength, last 6 h weighted)</div>
      ${buildTable(topStrength, [
        { label: "#",           cls: "rank-num",   fn: (r, i) => i + 1 },
        { label: "Node",        cls: "rank-name",  fn: r => r.name + typeBadge(r.node_type) },
        { label: "Hops",        cls: "rank-strength", fn: r => hopsCell(r) },
        { label: "Strength",    cls: "rank-count", fn: r => r.totalStrength.toFixed(2) },
        { label: "Total obs",   cls: "rank-strength", fn: r => r.totalObs },
        { label: "",            cls: "",           fn: r => mapBtn(r.hash) },
      ])}
    </div>`);

    el.innerHTML = sections.join("");
  }

  // ── Contacts page ────────────────────────────────────────────────────────
  const contactsMap    = new Map(); // key(12-char prefix) → contact data
  const pendingMap     = new Map(); // pubkey → pending contact data
  const pingState      = new Map(); // contact_key → {status, rtt_ms, snr, rssi}
  const contactsListEl = document.getElementById("contacts-list");
  const sortSelect     = document.getElementById("contacts-sort");
  const filterType     = document.getElementById("filter-type");
  const filterHops     = document.getElementById("filter-hops");
  const filterSeen     = document.getElementById("filter-seen");
  const filterChat     = document.getElementById("filter-chat");
  const autoaddToggle      = document.getElementById("autoadd-toggle");
  const purgeBtn           = document.getElementById("purge-btn");
  const pendingScrollEl    = document.getElementById("pending-scroll");
  const pendingCountLabel  = document.getElementById("pending-count-label");
  const contactsCountLabel = document.getElementById("contacts-count-label");

  autoaddToggle.addEventListener("change", () => {
    ws && ws.send(JSON.stringify({ type: "set_autoadd", value: autoaddToggle.checked ? 1 : 0 }));
  });

  purgeBtn.addEventListener("click", () => {
    if (confirm("Remove ALL contacts from this MeshCore device? This cannot be undone.")) {
      ws && ws.send(JSON.stringify({ type: "purge_contacts" }));
    }
  });

  // ── Smart-add helpers ────────────────────────────────────────────────────
  function getPathHashes() {
    const hashes = new Set();
    for (const [, ch] of channels) {
      for (const msg of ch.messages) {
        if (msg.path) {
          for (const node of msg.path) {
            if (node.hash) hashes.add(node.hash.toLowerCase());
          }
        }
      }
    }
    return hashes;
  }

  function getChatSenderNames() {
    const names = new Set();
    for (const [, ch] of channels) {
      for (const msg of ch.messages) {
        if (!msg.own && msg.sender) names.add(msg.sender.toLowerCase());
      }
    }
    return names;
  }

  function matchReasons(c, nodeKeys, pathHashes, chatNames) {
    // nodeKeys: Set of nodeMap keys (short hex), pathHashes: Set, chatNames: Set
    const pubkey = (c.pubkey || "").toLowerCase();
    const reasons = [];
    if (document.getElementById("auto-nodes").checked && c.node_type === 1) {
      for (const k of nodeKeys) {
        if (pubkey.startsWith(k.toLowerCase())) { reasons.push("in nodes"); break; }
      }
    }
    if (document.getElementById("auto-paths").checked && c.node_type === 1) {
      for (const h of pathHashes) {
        if (pubkey.startsWith(h)) { reasons.push("in paths"); break; }
      }
    }
    if (document.getElementById("auto-chatters").checked) {
      if (chatNames.has((c.name || "").toLowerCase())) reasons.push("seen chatting");
    }
    return reasons;
  }

  function updatePendingBadge() {
    const count = pendingMap.size;
    const navBtn = document.getElementById("nav-pending");
    if (!navBtn) return;
    let badge = navBtn.querySelector(".ch-badge");
    if (count > 0) {
      if (!badge) {
        badge = document.createElement("span");
        badge.className = "ch-badge";
        navBtn.appendChild(badge);
      }
      badge.textContent = count;
    } else if (badge) {
      badge.remove();
    }
    if (pendingCountLabel) {
      pendingCountLabel.textContent = count > 0 ? `${count} pending` : "";
    }
  }

  function renderPending() {
    pendingScrollEl.innerHTML = "";
    if (pendingMap.size === 0) {
      const empty = document.createElement("p");
      empty.style.cssText = "color:var(--text-muted);font-size:14px;text-align:center;margin-top:40px";
      empty.textContent = "No pending contacts";
      pendingScrollEl.appendChild(empty);
      return;
    }

    // Pre-compute sets once for the whole render pass
    const nodeKeys   = new Set(nodeMap.keys());
    const pathHashes = getPathHashes();
    const chatNames  = getChatSenderNames();

    for (const c of pendingMap.values()) {
      const reasons = matchReasons(c, nodeKeys, pathHashes, chatNames);
      const card = document.createElement("div");
      card.className = "pending-card" + (reasons.length ? " matched" : "");

      const avatar = document.createElement("div");
      avatar.className = "contact-avatar";
      avatar.style.cssText = `width:32px;height:32px;font-size:13px;color:${senderColour(c.name, c.pubkey)}`;
      avatar.textContent = c.name.charAt(0).toUpperCase();
      card.appendChild(avatar);

      const info = document.createElement("div");
      info.style.cssText = "flex:1;min-width:0";
      const nameEl = document.createElement("div");
      nameEl.className = "pending-name";
      nameEl.textContent = c.name;
      info.appendChild(nameEl);
      const metaEl = document.createElement("div");
      metaEl.className = "pending-meta";
      const parts = [c.node_type_name || "Unknown"];
      if (c.out_path_len != null) parts.push(c.out_path_len === -1 ? "flood" : `${c.out_path_len} hops`);
      if (c.last_advert) parts.push("seen " + fmtAgo(c.last_advert));
      metaEl.textContent = parts.join(" · ");
      info.appendChild(metaEl);
      card.appendChild(info);

      if (reasons.length) {
        const tag = document.createElement("span");
        tag.className = "pending-match-tag";
        tag.textContent = reasons.join(", ");
        card.appendChild(tag);
      }

      const addBtn = document.createElement("button");
      addBtn.className = "add-btn";
      addBtn.textContent = "Add";
      addBtn.addEventListener("click", () => {
        ws && ws.send(JSON.stringify({ type: "add_contact", pubkey: c.pubkey }));
        addBtn.disabled = true;
        addBtn.textContent = "Adding…";
      });
      card.appendChild(addBtn);
      pendingScrollEl.appendChild(card);
    }
  }

  function updateContactsCount() {
    if (contactsCountLabel) contactsCountLabel.textContent = `${contactsMap.size} contact${contactsMap.size !== 1 ? "s" : ""}`;
  }

  function processContactUpdate(c) {
    contactsMap.set(c.key, c);
    updateContactsCount();
    if (document.getElementById("page-contacts").classList.contains("active"))
      renderContacts();
  }

  function renderContacts() {
    const sortBy   = sortSelect.value;
    const typeVal  = filterType.value;
    const maxHops  = filterHops.value !== "" ? parseInt(filterHops.value) : null;
    const maxAge   = filterSeen.value !== "" ? parseInt(filterSeen.value) : null;
    const chatFilt = filterChat.value;
    const nowSec   = Math.floor(Date.now() / 1000);

    let items = [...contactsMap.values()];

    // Filters
    if (typeVal !== "") items = items.filter(c => String(c.node_type) === typeVal);
    if (maxHops !== null) items = items.filter(c => {
      const h = c.out_path_len;
      return h != null && h !== -1 && h <= maxHops;
    });
    if (maxAge !== null) items = items.filter(c =>
      c.last_advert != null && (nowSec - c.last_advert) <= maxAge
    );
    if (chatFilt === "yes") items = items.filter(c => (c.chat_count || 0) > 0);
    if (chatFilt === "no")  items = items.filter(c => (c.chat_count || 0) === 0);

    // Sort
    if (sortBy === "name") {
      items.sort((a, b) => (a.name || "").localeCompare(b.name || ""));
    } else if (sortBy === "last_advert") {
      items.sort((a, b) => (b.last_advert || 0) - (a.last_advert || 0));
    } else if (sortBy === "last_chat") {
      items.sort((a, b) => (b.last_chat || 0) - (a.last_chat || 0));
    } else if (sortBy === "chat_count") {
      items.sort((a, b) => (b.chat_count || 0) - (a.chat_count || 0));
    } else if (sortBy === "hops") {
      items.sort((a, b) => {
        const ha = a.out_path_len == null || a.out_path_len === -1 ? 999 : a.out_path_len;
        const hb = b.out_path_len == null || b.out_path_len === -1 ? 999 : b.out_path_len;
        return ha - hb;
      });
    }

    contactsListEl.innerHTML = "";
    if (items.length === 0) {
      contactsListEl.innerHTML = '<p id="contacts-empty">No contacts match the filter</p>';
      return;
    }

    for (const c of items) {
      const card = document.createElement("div");
      card.className = "contact-card";

      const avatar = document.createElement("div");
      avatar.className = "contact-avatar";
      avatar.style.color = senderColour(c.name, c.key);
      avatar.textContent = (c.name || "?").charAt(0).toUpperCase();
      card.appendChild(avatar);

      const body = document.createElement("div");
      body.className = "contact-body";

      const nameEl = document.createElement("div");
      nameEl.className = "contact-name";
      nameEl.textContent = c.name;
      body.appendChild(nameEl);

      const meta = document.createElement("div");
      meta.className = "contact-meta";

      if (c.node_type_name) {
        const typeChip = document.createElement("span");
        typeChip.className = "contact-chip" + (
          c.node_type === 1 ? " type-repeater" :
          c.node_type === 3 ? " type-gateway"  :
          c.node_type === 2 ? " type-room"     : ""
        );
        typeChip.textContent = c.node_type_name;
        meta.appendChild(typeChip);
      }

      const hopsChip = document.createElement("span");
      hopsChip.className = "contact-chip";
      if (c.out_path_len === -1)       hopsChip.textContent = "flood";
      else if (c.out_path_len != null) hopsChip.textContent = `${c.out_path_len} hop${c.out_path_len !== 1 ? "s" : ""}`;
      else                             hopsChip.textContent = "hops unknown";
      meta.appendChild(hopsChip);

      if (c.last_advert) {
        const seenChip = document.createElement("span");
        seenChip.className = "contact-chip";
        seenChip.textContent = "advert " + fmtAgo(c.last_advert);
        meta.appendChild(seenChip);
      }

      if (c.chat_count > 0) {
        const chatChip = document.createElement("span");
        chatChip.className = "contact-chip";
        chatChip.textContent = `${c.chat_count} msg${c.chat_count !== 1 ? "s" : ""}`;
        meta.appendChild(chatChip);
        if (c.last_chat) {
          const lastChatChip = document.createElement("span");
          lastChatChip.className = "contact-chip";
          lastChatChip.textContent = "chat " + fmtAgo(c.last_chat);
          meta.appendChild(lastChatChip);
        }
      }

      body.appendChild(meta);
      card.appendChild(body);

      if (c.lat != null && c.lon != null && (c.lat !== 0 || c.lon !== 0)) {
        const mapLink = document.createElement("a");
        mapLink.className = "contact-map";
        mapLink.href = `https://www.google.com/maps?q=${c.lat},${c.lon}`;
        mapLink.target = "_blank";
        mapLink.rel = "noopener";
        mapLink.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg> Map`;
        card.appendChild(mapLink);
      }

      if (c.node_type === 1 || c.node_type === 2 || c.node_type === 3) {
        const ps = pingState.get(c.key);

        if (ps && ps.status === "ok") {
          const res = document.createElement("span");
          res.className = "ping-result ok";
          res.textContent = `${ps.rtt_ms} ms` +
            (ps.snr  != null ? ` · ${ps.snr} dB`   : "") +
            (ps.rssi != null ? ` · ${ps.rssi} dBm` : "");
          card.appendChild(res);
        } else if (ps && ps.status === "timeout") {
          const res = document.createElement("span");
          res.className = "ping-result err";
          res.textContent = "timeout";
          card.appendChild(res);
        }

        const pingBtn = document.createElement("button");
        pingBtn.className = "ping-btn";
        if (ps && ps.status === "pending") {
          pingBtn.textContent = "…";
          pingBtn.disabled = true;
        } else {
          pingBtn.textContent = "Ping";
        }
        pingBtn.addEventListener("click", () => {
          if (!ws || !wsConnected) return;
          ws.send(JSON.stringify({ type: "ping_repeater", contact_key: c.key }));
        });
        card.appendChild(pingBtn);
      }

      contactsListEl.appendChild(card);
    }
  }

  [sortSelect, filterType, filterHops, filterSeen, filterChat].forEach(el =>
    el.addEventListener("change", renderContacts)
  );

  function sendSmartAddConfig() {
    if (!ws || !wsConnected) return;
    ws.send(JSON.stringify({
      type:     "set_smart_add",
      nodes:    document.getElementById("auto-nodes").checked,
      paths:    document.getElementById("auto-paths").checked,
      chatters: document.getElementById("auto-chatters").checked,
    }));
  }

  // When a smart-add checkbox is turned ON, scan existing pending and prompt
  ["auto-nodes", "auto-paths", "auto-chatters"].forEach(id => {
    document.getElementById(id).addEventListener("change", (e) => {
      sendSmartAddConfig();
      if (e.target.checked && pendingMap.size > 0) {
        const nodeKeys   = new Set(nodeMap.keys());
        const pathHashes = getPathHashes();
        const chatNames  = getChatSenderNames();
        const matched = [...pendingMap.values()].filter(
          c => matchReasons(c, nodeKeys, pathHashes, chatNames).length > 0
        );
        if (matched.length > 0 && ws && wsConnected) {
          if (confirm(`${matched.length} pending contact${matched.length !== 1 ? "s" : ""} match this filter. Add them now?`)) {
            for (const c of matched) {
              ws.send(JSON.stringify({ type: "add_contact", pubkey: c.pubkey }));
            }
          }
        }
      }
      renderPending();
    });
  });

  document.getElementById("add-matched-btn").addEventListener("click", () => {
    if (!ws || !wsConnected) return;
    const nodeKeys   = new Set(nodeMap.keys());
    const pathHashes = getPathHashes();
    const chatNames  = getChatSenderNames();
    const matched = [...pendingMap.values()].filter(
      c => matchReasons(c, nodeKeys, pathHashes, chatNames).length > 0
    );
    if (matched.length === 0) {
      alert("No pending contacts match the selected filters.");
      return;
    }
    if (confirm(`Add ${matched.length} matched contact${matched.length !== 1 ? "s" : ""}?`)) {
      for (const c of matched) {
        ws.send(JSON.stringify({ type: "add_contact", pubkey: c.pubkey }));
      }
    }
  });

  // ── DM / Chats ───────────────────────────────────────────────────────────
  const dmChats      = new Map(); // contact_key → {name, messages[], unread, lastTs}
  const chatsPageEl  = document.getElementById("page-chats");
  const dmPageEl     = document.getElementById("page-dm");
  const dmMessagesEl = document.getElementById("dm-messages");
  const dmContactEl  = document.getElementById("dm-contact-name");
  const dmInput      = document.getElementById("dm-input");
  const dmSendBtn    = document.getElementById("dm-send");
  const dmBackBtn    = document.getElementById("dm-back");
  let currentDmKey   = null;

  function getOrCreateDmChat(key, name) {
    if (!dmChats.has(key)) {
      dmChats.set(key, { name: name || key, messages: [], unread: 0, lastTs: 0 });
    } else if (name && name !== key) {
      dmChats.get(key).name = name;
    }
    return dmChats.get(key);
  }

  function processDm(msg) {
    const key  = msg.contact_key;
    const name = msg.contact_name || key;
    const chat = getOrCreateDmChat(key, name);
    // Deduplicate
    if (chat.messages.some(m => m.id === msg.id)) return;
    chat.messages.push(msg);
    chat.lastTs = Math.max(chat.lastTs, msg.timestamp);
    if (currentDmKey === key) {
      // Viewing this thread — mark read immediately
      setLastReadId("dm_" + key, msg.id);
    } else if ((msg.id || 0) > getLastReadId("dm_" + key)) {
      chat.unread++;
      updateNavChatsUnread();
    }
    if (chatsPageEl.classList.contains("active")) renderChatsList();
    if (dmPageEl.classList.contains("active") && currentDmKey === key) appendDmBubble(msg);
  }

  function renderChatsList() {
    chatsPageEl.innerHTML = "";
    if (dmChats.size === 0) {
      const empty = document.createElement("p");
      empty.style.cssText = "color:var(--text-muted);font-size:14px;text-align:center;margin-top:40px";
      empty.textContent = "No direct messages yet";
      chatsPageEl.appendChild(empty);
      return;
    }
    const sorted = [...dmChats.entries()].sort((a, b) => b[1].lastTs - a[1].lastTs);
    for (const [key, chat] of sorted) {
      const last = chat.messages[chat.messages.length - 1];
      const item = document.createElement("div");
      item.className = "chat-item";

      const avatar = document.createElement("div");
      avatar.className = "chat-avatar";
      avatar.style.color = senderColour(chat.name, key);
      avatar.textContent = chat.name.charAt(0).toUpperCase();
      item.appendChild(avatar);

      const body = document.createElement("div");
      body.className = "chat-item-body";

      const hdr = document.createElement("div");
      hdr.className = "chat-item-header";
      const nameEl = document.createElement("span");
      nameEl.className = "chat-item-name";
      nameEl.textContent = chat.name;
      if (key) {
        const pkPrev = document.createElement("span");
        pkPrev.className = "pubkey-preview";
        pkPrev.textContent = key.slice(0, 4);
        pkPrev.title = key;
        nameEl.appendChild(pkPrev);
      }
      hdr.appendChild(nameEl);
      if (last) {
        const timeEl = document.createElement("span");
        timeEl.className = "chat-item-time";
        timeEl.textContent = fmtTime(last.timestamp);
        hdr.appendChild(timeEl);
      }
      body.appendChild(hdr);

      if (last) {
        const preview = document.createElement("div");
        preview.className = "chat-item-preview";
        preview.textContent = (last.own ? "You: " : "") + last.text;
        body.appendChild(preview);
      }
      item.appendChild(body);

      if (chat.unread > 0) {
        const badge = document.createElement("span");
        badge.className = "chat-unread";
        badge.textContent = chat.unread;
        item.appendChild(badge);
      }

      item.addEventListener("click", () => openDmThread(key));
      chatsPageEl.appendChild(item);
    }
  }

  function openDmThread(key) {
    const chat = dmChats.get(key);
    if (!chat) return;
    currentDmKey = key;
    chat.unread = 0;
    setLastReadId("dm_" + key, maxMsgId(chat.messages));
    updateNavChatsUnread();
    if (chatsPageEl.classList.contains("active")) renderChatsList();

    dmContactEl.textContent = chat.name;
    dmMessagesEl.innerHTML = "";
    for (const msg of chat.messages) appendDmBubble(msg);
    dmMessagesEl.scrollTop = dmMessagesEl.scrollHeight;
    dmInput.disabled    = !wsConnected;
    dmSendBtn.disabled  = !wsConnected;

    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    dmPageEl.classList.add("active");
    document.querySelectorAll(".nav-item").forEach(b => b.classList.remove("active"));
    document.querySelector(".nav-item[data-page='chats']").classList.add("active");
  }

  function appendDmBubble(msg) {
    const row = document.createElement("div");
    row.className = msg.own ? "bubble-row own" : "bubble-row";

    if (!msg.own) {
      const senderDiv = document.createElement("div");
      senderDiv.className = "sender";
      const senderName = document.createElement("span");
      senderName.textContent = msg.sender;
      senderName.style.color = senderColour(msg.sender, msg.contact_key);
      senderDiv.appendChild(senderName);
      if (msg.contact_key) {
        const pkPrev = document.createElement("span");
        pkPrev.className = "pubkey-preview";
        pkPrev.textContent = msg.contact_key.slice(0, 4);
        pkPrev.title = msg.contact_key;
        senderDiv.appendChild(pkPrev);
      }
      row.appendChild(senderDiv);
    }

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    const textSpan = renderText(msg.text);
    const timeSpan = document.createElement("span");
    timeSpan.className = "time";
    timeSpan.textContent = fmtTime(msg.timestamp);
    bubble.appendChild(textSpan);
    bubble.appendChild(timeSpan);
    row.appendChild(bubble);
    dmMessagesEl.appendChild(row);
  }

  function updateNavChatsUnread() {
    let total = 0;
    for (const chat of dmChats.values()) total += chat.unread;
    const navBtn = document.querySelector(".nav-item[data-page='chats']");
    if (!navBtn) return;
    let badge = navBtn.querySelector(".ch-badge");
    if (total > 0) {
      if (!badge) {
        badge = document.createElement("span");
        badge.className = "ch-badge";
        navBtn.appendChild(badge);
      }
      badge.textContent = total;
    } else if (badge) {
      badge.remove();
    }
  }

  dmBackBtn.addEventListener("click", () => {
    currentDmKey = null;
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    chatsPageEl.classList.add("active");
    document.querySelectorAll(".nav-item").forEach(b => b.classList.remove("active"));
    document.querySelector(".nav-item[data-page='chats']").classList.add("active");
    renderChatsList();
  });

  function sendDm() {
    const text = dmInput.value.trim();
    if (!text || !currentDmKey || !wsConnected || !ws) return;
    ws.send(JSON.stringify({ type: "send_dm", contact_key: currentDmKey, text }));
    dmInput.value = "";
  }

  dmSendBtn.addEventListener("click", sendDm);
  dmInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendDm(); }
  });

  // ── Network graph ────────────────────────────────────────────────────────
  const graphNodes = new Map(); // id → node data
  const graphEdges = new Map(); // "a:b" → edge data

  // ── New-node tracking ────────────────────────────────────────────────────
  // _graphKnownNodes: persisted set of node IDs the user has "seen"
  // _graphNewNodes:   nodes that arrived since the last read — shown with badge/highlight
  // Nodes that arrive WHILE the graph page is open get highlighted but are
  // NOT added to known until the NEXT visit (so the user can notice them).
  let _graphKnownNodes = new Set();
  let _graphNewNodes   = new Set();
  let _graphPageOpen   = false;

  function _loadKnownGraphNodes() {
    try { _graphKnownNodes = new Set(JSON.parse(localStorage.getItem("graphKnownNodes") || "[]")); }

  function clearRouteHighlight(unlock = false) {

  function highlightMessageRoute(senderHash, pathHops) {
    const chain = [];
    if (senderHash) chain.push(senderHash);
    for (const h of pathHops) { if (h) chain.push(h); }
    chain.push("self");
    if (chain.length < 2) return;

    clearRouteHighlight();
    _highlightNodeId = senderHash || null;

    // Synthesize any missing nodes/edges so the highlight is always contiguous.
    // Also record which edges flow reverse (b→a) so animation direction is correct.
    // Update last_seen for all path edges to now — nodes in the most recent
    // message path must never disappear due to the age filter.
    const nowSec = Date.now() / 1000;
    let graphDirty = false;
    for (let i = 0; i < chain.length - 1; i++) {
      const srcId = chain[i];
      const dstId = chain[i + 1];
      const a = srcId < dstId ? srcId : dstId;
      const b = srcId < dstId ? dstId : srcId;
      const key = `${a}:${b}`;
      _routeLinkKeys.add(key);
      // If message flowed b→a (against canonical order), mark as reverse
      if (srcId === b) _routeLinkReverse.add(key);
      if (!graphEdges.has(key)) {
        graphEdges.set(key, { a, b, count: 0, strength: 0.5, last_seen: nowSec });
        graphDirty = true;
      } else {
        // Refresh last_seen so the age filter won't hide these nodes
        const e = graphEdges.get(key);
        if (nowSec > e.last_seen) { e.last_seen = nowSec; graphDirty = true; }
      }
      for (const h of [srcId, dstId]) {
        if (!graphNodes.has(h)) {
          graphNodes.set(h, { id: h, name: h === "self" ? "You" : h.slice(0, 8),
            node_type: null, is_self: h === "self", lat: null, lon: null });
          graphDirty = true;
        }
      }
    }

    if (graphDirty && graphInited) updateGraphViz();
    else { _applyRouteHighlight(); _applyNodeHighlight(); }
  }

  function _applyRouteHighlight() {
    if (!_gLinkSel || !_routeLinkKeys.size) return;
    _gLinkSel
      .classed("link-route",     d => _routeLinkKeys.has(`${d.a}:${d.b}`))
      .classed("link-route-rev", d => _routeLinkReverse.has(`${d.a}:${d.b}`));

  function _applyNodeHighlight() {

  // ── Sender location marker on Leaflet map ─────────────────────────────────
  function updateSenderMarker(msg) {
    if (_messagePin) { _messagePin.remove(); _messagePin = null; }
    if (!_leafletMap || !window.L) return;

    const senderHash  = msg.sender_hash || "";
    const pathHashes  = (msg.path || []).map(h => (typeof h === "object" ? h.hash : h));

    // 1) Exact location from message payload
    let lat = null, lon = null, exact = false;
    if (msg.sender_lat != null && msg.sender_lon != null &&
        !(msg.sender_lat === 0 && msg.sender_lon === 0)) {
      lat = msg.sender_lat; lon = msg.sender_lon; exact = true;
    }

    // 2) Exact location from graph node record or custom data
    if (lat == null) {
      const node = graphNodes.get(senderHash);
      if (node?.lat != null && node?.lon != null) {
        lat = node.lat; lon = node.lon; exact = true;
      } else {
        const custom = _customNodeData[senderHash];
        if (custom?.lat != null && custom?.lon != null) {
          lat = custom.lat; lon = custom.lon; exact = true;
        }
      }
    }

    // 3) Estimated: use first hop's known location (or custom)
    if (lat == null && pathHashes.length > 0) {
      for (const h of pathHashes) {
        const hop = graphNodes.get(h);
        const hopCustom = _customNodeData[h];
        const hLat = hop?.lat ?? hopCustom?.lat;
        const hLon = hop?.lon ?? hopCustom?.lon;
        if (hLat != null && hLon != null) {
          lat = hLat; lon = hLon; exact = false;
          break;
        }
      }
    }

    if (lat == null) return;

    _messagePin = L.circleMarker([lat, lon], {
      radius:      exact ? 10 : 8,
      color:       exact ? "#4f8ef7" : "#7b82a8",
      fillColor:   exact ? "#4f8ef7" : "#7b82a8",
      fillOpacity: exact ? 0.25 : 0.1,
      weight:      2,
      dashArray:   exact ? null : "5 4",
    }).bindTooltip(
      `${msg.sender}${exact ? "" : " (estimated location)"}`,
      { permanent: true, direction: "top", offset: [0, -10] }
    ).addTo(_leafletMap);
  }

  function setCustomNode(id, fields) {

  // Effective display name: server name if it's a real contact name (not just

  function effectiveName(node) {
    const serverIsReal = node.name && node.name !== (node.id || "").slice(0, 8);
    if (serverIsReal) return node.name;

  // ── Graph filter settings ─────────────────────────────────────────────────
  // maxAgeHours:    fractional hours; age slider is logarithmic 0–100 → 1 min–7 days
  // minStrengthPct: % of current max strength; strength slider logarithmic 0–100 → 0–90%
  let _graphFilters = { maxAgeHours: 168, minStrengthPct: 0 };

  // Age: slider 0 = "latest path only"; slider 1–100 = logarithmic 1 min – 7 days
  // Age window is measured from the latest received message timestamp (not wall clock).
  const _AGE_MAX_MINS = 10080;
  function _sliderToHours(v) {
    if (v <= 0) return 0; // special: "latest path" mode
    return Math.exp(v * Math.log(_AGE_MAX_MINS) / 100) / 60;
  }
  function _hoursToSlider(h) {
    if (h <= 0) return 0;
    return Math.round(100 * Math.log(Math.max(1, h * 60)) / Math.log(_AGE_MAX_MINS));
  }

  // Strength: logarithmic 0–100 ↔ 0–90% of max strength
  // Formula: pct = exp(v/100 * ln(91)) - 1  →  v=0→0%, v=100→90%
  const _STR_LOG_BASE = Math.log(91);
  function _strSliderToPct(v) {
    if (v <= 0) return 0;
    return Math.exp((v / 100) * _STR_LOG_BASE) - 1;
  }
  function _strPctToSlider(pct) {
    if (pct <= 0) return 0;
    return Math.round(100 * Math.log(pct + 1) / _STR_LOG_BASE);
  }
  function _fmtStrPct(pct) {
    if (pct <= 0) return "off";
    if (pct < 1)  return `${pct.toFixed(1)}%`;
    return `${Math.round(pct)}%`;
  }

  function _loadGraphFilters() {
    try {
      const s = JSON.parse(localStorage.getItem("graphFilters") || "{}");
      if (s.maxAgeHours    != null) _graphFilters.maxAgeHours    = s.maxAgeHours;
      if (s.minStrengthPct != null) _graphFilters.minStrengthPct = s.minStrengthPct;
    } catch {}
  }
  function _saveGraphFilters() {

  }
  function _fmtAgeHours(h) {
    if (h <= 0) return "latest";
    const mins = h * 60;
    if (mins < 60) return `${Math.round(mins)}m`;
    if (h >= 168) return "7d";
    if (h >= 48)  return `${Math.round(h/24)}d`;
    if (h >= 24)  return "24h";
    return `${Math.round(h)}h`;
  }

  function initLeaflet() {
    if (_leafletMap || !window.L) return;
    _leafletMap = L.map("graph-map", { zoomControl: true, attributionControl: true })
      .setView([51.5, -0.09], 10);
    const savedTile = localStorage.getItem("graphTileStyle") || "dark";
    setMapTileStyle(savedTile);
    // During pan/zoom animations Leaflet moves tiles via CSS transform but our
    // SVG is a separate absolutely-positioned element — it doesn't move with the
    // tiles unless we reproject every animation frame.  The RAF loop in
    // _startMapRaf() handles this; here we just make sure it's running whenever
    // the map is moving and does one final render when motion ends.
    _leafletMap.on("movestart zoomstart", () => { if (_mapMode) _startMapRaf(); });
    _leafletMap.on("moveend zoomend",     () => { if (_mapMode) { _stopMapRaf(); renderGraphPositions(); _applyZoomVisuals(); } });
