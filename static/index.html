<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MeshCore — Public Channel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3250;
      --accent: #4f8ef7;
      --accent-dim: #2a4a8a;
      --text: #e8eaf6;
      --text-muted: #7b82a8;
      --bubble-bg: #1e2235;
      --bubble-border: #2e3a60;
      --status-ok: #4caf88;
      --status-err: #e05c5c;
      --status-warn: #e0a030;
      --radius: 16px;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 15px;
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      user-select: none;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.02em;
      flex: 1;
    }

    header h1 span {
      color: var(--accent);
    }

    #status {
      font-size: 12px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.3s, color 0.3s;
    }

    #status::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    #status.connected    { background: #0d2b1e; color: var(--status-ok);  }
    #status.connected::before { background: var(--status-ok); box-shadow: 0 0 6px var(--status-ok); }
    #status.disconnected { background: #2a1010; color: var(--status-err); }
    #status.disconnected::before { background: var(--status-err); }
    #status.reconnecting { background: #2a1d06; color: var(--status-warn); }
    #status.reconnecting::before { background: var(--status-warn); animation: pulse 1s ease-in-out infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── Message list ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Empty state ── */
    #empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text-muted);
      pointer-events: none;
    }

    #empty svg { opacity: 0.25; }
    #empty p { font-size: 14px; }

    /* ── Bubble ── */
    .bubble-row {
      display: flex;
      flex-direction: column;
      max-width: min(520px, 88%);
      animation: fadeUp 0.2s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .sender {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 3px;
      padding-left: 4px;
    }

    .bubble {
      background: var(--bubble-bg);
      border: 1px solid var(--bubble-border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      padding: 10px 14px;
      position: relative;
      word-break: break-word;
      line-height: 1.5;
    }

    .bubble .text {
      padding-right: 44px; /* room for timestamp */
    }

    .bubble .time {
      position: absolute;
      bottom: 7px;
      right: 10px;
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .channel-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      margin-bottom: 3px;
      align-self: flex-start;
    }

    .bubble-row.system .bubble {
      background: transparent;
      border-color: var(--border);
      border-style: dashed;
      color: var(--text-muted);
      font-size: 13px;
    }

    /* ── Date separator ── */
    .date-sep {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-muted);
      font-size: 12px;
      margin: 6px 0;
    }

    .date-sep::before,
    .date-sep::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }
  </style>
</head>
<body>

<header>
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 2a9 9 0 0 1 9 9c0 4.97-4.03 9-9 9a9 9 0 0 1-9-9 9 9 0 0 1 9-9z" opacity=".3"/>
    <path d="M12 6v6l4 2"/>
    <circle cx="12" cy="12" r="1" fill="var(--accent)" stroke="none"/>
    <path d="M4.5 4.5l1.5 1.5M19.5 4.5l-1.5 1.5M4.5 19.5l1.5-1.5M19.5 19.5l-1.5-1.5"/>
  </svg>
  <h1>MeshCore &mdash; <span>Public Channel</span></h1>
  <div id="status" class="disconnected">Disconnected</div>
</header>

<div id="messages">
  <div id="empty">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    <p>Waiting for messages&hellip;</p>
  </div>
</div>

<script>
  const statusEl  = document.getElementById("status");
  const messagesEl = document.getElementById("messages");
  const emptyEl   = document.getElementById("empty");

  // ── Colour palette for sender names (derived from name hash) ────────────
  const COLOURS = [
    "#6fa8ff", "#ff7e7e", "#6fcf97", "#f2c94c",
    "#bb86fc", "#56ccf2", "#f2994a", "#eb5757",
  ];

  function senderColour(name) {
    let h = 0;
    for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
    return COLOURS[h % COLOURS.length];
  }

  // ── Time formatting ──────────────────────────────────────────────────────
  function fmtTime(unixSecs) {
    const d = new Date(unixSecs * 1000);
    return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", hour12: false });
  }

  function fmtDate(unixSecs) {
    const d = new Date(unixSecs * 1000);
    const today = new Date();
    const yesterday = new Date(today);
    yesterday.setDate(today.getDate() - 1);
    if (d.toDateString() === today.toDateString()) return "Today";
    if (d.toDateString() === yesterday.toDateString()) return "Yesterday";
    return d.toLocaleDateString([], { weekday: "long", month: "short", day: "numeric" });
  }

  // ── State ────────────────────────────────────────────────────────────────
  const seenIds = new Set();
  let lastDateLabel = null;
  let atBottom = true;

  messagesEl.addEventListener("scroll", () => {
    atBottom = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 60;
  });

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // ── Render a message (skips duplicates) ─────────────────────────────────
  function addMessage(msg) {
    if (seenIds.has(msg.id)) return;
    seenIds.add(msg.id);

    const isSystem = msg.channel_name === "system";
    const dateLabel = fmtDate(msg.timestamp);

    if (!isSystem && dateLabel !== lastDateLabel) {
      lastDateLabel = dateLabel;
      const sep = document.createElement("div");
      sep.className = "date-sep";
      sep.textContent = dateLabel;
      messagesEl.appendChild(sep);
    }

    const row = document.createElement("div");
    row.className = isSystem ? "bubble-row system" : "bubble-row";

    if (!isSystem) {
      // Channel tag
      const channelLabel = msg.channel_name || (msg.channel_idx != null ? `ch${msg.channel_idx}` : null);
      if (channelLabel) {
        const tag = document.createElement("span");
        tag.className = "channel-tag";
        tag.textContent = channelLabel;
        row.appendChild(tag);
      }

      const senderDiv = document.createElement("div");
      senderDiv.className = "sender";
      senderDiv.textContent = msg.sender;
      senderDiv.style.color = senderColour(msg.sender);
      row.appendChild(senderDiv);
    }

    const bubble = document.createElement("div");
    bubble.className = "bubble";

    const textSpan = document.createElement("span");
    textSpan.className = "text";
    textSpan.textContent = msg.text;

    const timeSpan = document.createElement("span");
    timeSpan.className = "time";
    timeSpan.textContent = fmtTime(msg.timestamp);

    bubble.appendChild(textSpan);
    bubble.appendChild(timeSpan);
    row.appendChild(bubble);

    // Remove empty state on first message
    if (emptyEl && emptyEl.parentNode) emptyEl.remove();

    messagesEl.appendChild(row);

    if (atBottom) scrollToBottom();
  }

  // ── WebSocket with auto-reconnect ────────────────────────────────────────
  const WS_URL = `ws://${location.host}/ws`;
  let ws = null;
  let reconnectDelay = 1000;

  function setStatus(state, label) {
    statusEl.className = state;
    statusEl.textContent = label;
  }

  function connect() {
    setStatus("reconnecting", "Connecting\u2026");
    ws = new WebSocket(WS_URL);

    ws.addEventListener("open", () => {
      setStatus("connected", "Connected");
      reconnectDelay = 1000;
    });

    ws.addEventListener("message", (evt) => {
      let packet;
      try { packet = JSON.parse(evt.data); } catch { return; }
      if (packet.type === "history") {
        // Sort by timestamp then render in order, skipping any already shown
        const sorted = [...packet.messages].sort((a, b) => a.timestamp - b.timestamp);
        sorted.forEach(addMessage);
        scrollToBottom();
      } else if (packet.type === "message") {
        addMessage(packet);
      }
    });

    ws.addEventListener("close", () => {
      setStatus("disconnected", "Disconnected");
      ws = null;
      setTimeout(connect, reconnectDelay);
      reconnectDelay = Math.min(reconnectDelay * 2, 16000);
    });

    ws.addEventListener("error", () => {
      ws.close();
    });
  }

  connect();
</script>
</body>
</html>
