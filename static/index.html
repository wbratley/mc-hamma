  // ── Map-mode position engine ─────────────────────────────────────────────
  // Returns Map<id, {x,y}> in container-pixel space for every node.
  // Geo-nodes: projected from lat/lon.
  // Floating nodes: centroid of linked neighbours (multi-pass so chains work).
  // True isolates: scattered around the geographic centroid of all geo-nodes.
  function computeMapPositions() {
    const pos = new Map();
    const edgesArr = [...graphEdges.values()];

    // Step 1 — geo-nodes (real GPS, user-dragged virtual, or custom lat/lon)
    // Treat 0,0 (null island — GPS-less devices default) as no location
    for (const n of _gSimNodes) {
      const custom = _customNodeData[n.id];
      const ll = n._mapVirtualLatLon ??
        (n.lat != null && n.lon != null && !(n.lat === 0 && n.lon === 0) ? [n.lat, n.lon] :
         (custom?.lat != null && custom?.lon != null ? [custom.lat, custom.lon] : null));
      if (ll) {
        const pt = _leafletMap.latLngToContainerPoint(ll);
        pos.set(n.id, { x: pt.x, y: pt.y });
      }
    }

    // Step 2 — adjacency
    const adj = new Map(_gSimNodes.map(n => [n.id, []]));
    for (const e of edgesArr) { adj.get(e.a)?.push(e.b); adj.get(e.b)?.push(e.a); }

    // Step 3 — centroid for floating nodes, iterate until stable
    for (let pass = 0, changed = true; pass < 15 && changed; pass++) {
      changed = false;
      for (const n of _gSimNodes) {
        if (pos.has(n.id)) continue;
        const known = (adj.get(n.id) || []).filter(id => pos.has(id));
        if (known.length) {
          pos.set(n.id, {
            x: known.reduce((s, id) => s + pos.get(id).x, 0) / known.length,
            y: known.reduce((s, id) => s + pos.get(id).y, 0) / known.length,
          });
          changed = true;
        }
      }
    }

    // Step 4 — true isolates: scatter around the geographic centroid of all
    // positioned nodes so they reproject correctly on zoom (unlike using
    // latLngToContainerPoint(getCenter()) which is always the same pixel).
    const isolates = _gSimNodes.filter(n => !pos.has(n.id));
    if (isolates.length) {
      // Compute the lat/lon centroid of all geo-nodes to use as anchor
      const geoNodes = _gSimNodes.filter(n => {
        const custom = _customNodeData[n.id];
        const ll = n._mapVirtualLatLon ??
          (n.lat != null ? [n.lat, n.lon] :
           (custom?.lat != null ? [custom.lat, custom.lon] : null));
        return ll != null;
      });
      let anchorPt;
      if (geoNodes.length) {
        const lats = geoNodes.map(n => (n._mapVirtualLatLon ?? [n.lat, n.lon])[0]);
        const lons = geoNodes.map(n => (n._mapVirtualLatLon ?? [n.lat, n.lon])[1]);
        const avgLat = lats.reduce((s,v)=>s+v,0)/lats.length;
        const avgLon = lons.reduce((s,v)=>s+v,0)/lons.length;
        anchorPt = _leafletMap.latLngToContainerPoint([avgLat, avgLon]);
      } else {
        anchorPt = _leafletMap.latLngToContainerPoint(_leafletMap.getCenter());
      }
      isolates.forEach((n, i) => {
        const a = (i / Math.max(1, isolates.length)) * 2 * Math.PI;
        pos.set(n.id, { x: anchorPt.x + 80*Math.cos(a), y: anchorPt.y + 80*Math.sin(a) });
      });
    }

    return pos;
  }

  // ── Unified render — called from sim tick (force) and Leaflet events (map) ─
  function renderGraphPositions() {
    if (!_gLinkSel || !_gNodeSel) return;

    if (_mapMode && _leafletMap) {
      // Compute positions and write them into the node data objects
      const pos = computeMapPositions();
      const nodeById = new Map(_gSimNodes.map(n => [n.id, n]));
      for (const n of _gSimNodes) { const p = pos.get(n.id); if (p) { n.x = p.x; n.y = p.y; } }
      // forceLink isn't running in map mode — resolve source/target strings to objects
      _gLinkSel.each(d => {
        if (typeof d.source === "string") d.source = nodeById.get(d.source);
        if (typeof d.target === "string") d.target = nodeById.get(d.target);
      });
    }

    _gNodeSel.attr("transform", d => `translate(${d.x ?? 0},${d.y ?? 0})`);
    _gLinkSel
      .attr("x1", d => d.source?.x ?? 0).attr("y1", d => d.source?.y ?? 0)
      .attr("x2", d => d.target?.x ?? 0).attr("y2", d => d.target?.y ?? 0);
  }

  function graphTick() { renderGraphPositions(); }

  // ── Click tooltip ────────────────────────────────────────────────────────
  let _graphTooltip = null;
  let _tooltipPinned = false;

  function showGraphTooltip(event, text) {
    if (!_graphTooltip) {
      _graphTooltip = document.createElement("div");
      _graphTooltip.className = "graph-tooltip";
      _graphTooltip.style.cursor = "pointer";
      _graphTooltip.title = "Click to close";
      _graphTooltip.addEventListener("click", hideGraphTooltip);
      document.body.appendChild(_graphTooltip);
    }
    _graphTooltip.innerHTML = text.split("\n").join("<br>");
    _graphTooltip.style.display = "block";
    _tooltipPinned = true;
    positionGraphTooltip(event);
    event.stopPropagation();
  }
  function positionGraphTooltip(event) {
    if (!_graphTooltip) return;
    _graphTooltip.style.left = Math.min(event.clientX + 14, window.innerWidth  - 230) + "px";
    _graphTooltip.style.top  = Math.min(event.clientY + 14, window.innerHeight - 120) + "px";
  }
  function hideGraphTooltip() {
    if (_graphTooltip) _graphTooltip.style.display = "none";
    _tooltipPinned = false;
  }
  // Click anywhere else dismisses the tooltip
  document.addEventListener("click", () => { if (_tooltipPinned) hideGraphTooltip(); });

  // ── Main bind — called when graph data changes or page becomes active ────
  // ── Zoom-responsive visuals ──────────────────────────────────────────────
  // Scales node radii, label visibility, and line widths with current zoom.
  function _applyZoomVisuals() {
    if (!_gNodeSel || !_gLinkSel) return;
    let k;
    if (_mapMode && _leafletMap) {
      // Leaflet zoom 12 → scale 1.0; halves every 2.5 zoom levels zooming out
      k = Math.max(0.08, Math.min(1.5, Math.pow(2, (_leafletMap.getZoom() - 12) / 2.5)));
    } else {
      k = Math.max(0.08, _zoomK);
    }
    const vs = Math.min(k, 1); // cap at 1 — don't grow nodes beyond base size

    _gNodeSel.select("circle.graph-node-circle")
      .attr("r", d => (8 + 12*((_degree.get(d.id)||0)/_maxDeg)) * vs);

    _gNodeSel.select("text.graph-node-label")
      .attr("visibility", k < 0.55 ? "hidden" : "visible")
      .attr("dy", d => -(10 + 12*((_degree.get(d.id)||0)/_maxDeg)) * vs);

    // Only scale non-route links (route links have CSS !important stroke-width)
    _gLinkSel.filter(function() { return !this.classList.contains("link-route"); })
      .attr("stroke-width", d => (1 + 4*(d.strength/_maxStr)) * vs);
  }

  function updateGraphViz() {
    if (!graphInited || !graphG) return;

    const nodesArr = [...graphNodes.values()];
    let   edgesArr = [...graphEdges.values()];

    // ── Apply edge filters ───────────────────────────────────────────────
    // Reference time: always wall clock. _latestMsgTimestamp is monotonically
    // growing and can be permanently corrupted by a single bad device clock
    // (future timestamp in message history), making every edge fail the filter.
    // last_seen on edges is set from server wall clock, so wall clock is the
    // only correct reference.
    const refTime    = Date.now() / 1000;
    const maxAgeSecs = _graphFilters.maxAgeHours * 3600;
    const allMaxStr  = Math.max(...edgesArr.map(e => e.strength), 1);
    const minStr     = (_graphFilters.minStrengthPct / 100) * allMaxStr;
    if (maxAgeSecs === 0) {
      // "Latest path" mode — show only the currently highlighted route edges
      edgesArr = edgesArr.filter(e => _routeLinkKeys.has(`${e.a}:${e.b}`) && e.strength >= minStr);
    } else {
      edgesArr = edgesArr.filter(e =>
        (refTime - e.last_seen) <= maxAgeSecs && e.strength >= minStr
      );
    }
    // Keep only nodes that have at least one visible edge (self always shown)
    const visIds = new Set(["self"]);
    for (const e of edgesArr) { visIds.add(e.a); visIds.add(e.b); }
    const filteredNodes = nodesArr.filter(n => visIds.has(n.id));

    // Degree & strength for visual scaling
    _degree = new Map();
    for (const e of edgesArr) {
      _degree.set(e.a, (_degree.get(e.a) || 0) + e.strength);
      _degree.set(e.b, (_degree.get(e.b) || 0) + e.strength);
    }
    _maxDeg = Math.max(..._degree.values(), 1);
    const maxStr = Math.max(...edgesArr.map(e => e.strength), 1);
    _maxStr = maxStr;

    // ── Links ────────────────────────────────────────────────────────────
    edgesArr.forEach(e => { e.source = e.a; e.target = e.b; });

    const linkUpd = graphG.select(".links").selectAll("line.graph-link")
      .data(edgesArr, d => `${d.a}:${d.b}`);

    linkUpd.enter().append("line").attr("class", "graph-link")
      .merge(linkUpd)
      .attr("stroke",       d => `rgba(79,142,247,${0.15 + 0.65*(d.strength/maxStr)})`)
      .attr("stroke-width", d => 1 + 4*(d.strength/maxStr))
      .on("click", (event, d) => {
        const na = graphNodes.get(d.a), nb = graphNodes.get(d.b);
        showGraphTooltip(event,
          `${na ? effectiveName(na) : d.a.slice(0,8)} ↔ ${nb ? effectiveName(nb) : d.b.slice(0,8)}\n` +
          `Observations: ${d.count}\nStrength: ${d.strength.toFixed(2)}\nLast seen: ${fmtAgo(d.last_seen)}`);
      });
    linkUpd.exit().remove();
    _gLinkSel = graphG.select(".links").selectAll("line.graph-link");

    // ── Nodes — carry sim position across data refreshes ─────────────────
    const prevMap = new Map(_gSimNodes.map(n => [n.id, n]));
    const { W, H } = graphContainerDims();
    // Iterate ALL nodes (not just filtered) so positions are maintained even when hidden
    for (const n of nodesArr) {
      const prev = prevMap.get(n.id);
      if (prev) {
        n.x = prev.x; n.y = prev.y; n.vx = prev.vx; n.vy = prev.vy;
        if (prev.fx != null) { n.fx = prev.fx; n.fy = prev.fy; }
        if (prev._mapVirtualLatLon) n._mapVirtualLatLon = prev._mapVirtualLatLon;
      } else {
        n.x = W/2 + (Math.random()-0.5)*W*0.5;
        n.y = H/2 + (Math.random()-0.5)*H*0.5;
        // First appearance: seed map position from custom lat/lon if node has no real GPS
        const custom = _customNodeData[n.id];
        if (custom?.lat != null && custom?.lon != null && n.lat == null) {
          n._mapVirtualLatLon = [custom.lat, custom.lon];
        }
      }
    }
    _gSimNodes = filteredNodes;

    const nodeBind = graphG.select(".gnodes").selectAll("g.gnode")
      .data(_gSimNodes, d => d.id);

    const nodeEnter = nodeBind.enter().append("g").attr("class", "gnode")
      .call(d3.drag()
        .on("start", (event, d) => {
          // Geo-nodes are fixed in map mode — don't allow drag
          if (_mapMode && d.lat != null && d.lon != null && !d._mapVirtualLatLon) return;
          if (!_mapMode && !event.active) graphSim.alphaTarget(0.3).restart();
          d.fx = d.x; d.fy = d.y;
        })
        .on("drag", (event, d) => {
          d.x = event.x; d.y = event.y;
          if (!_mapMode) d.fx = event.x; d.fy = event.y;
          if (_mapMode) renderGraphPositions(); // live feedback
        })
        .on("end", (event, d) => {
          if (!_mapMode) {
            if (!event.active) graphSim.alphaTarget(0);
            // Release floating nodes in force mode so sim continues to act on them
            if (d.lat == null && d.lon == null) { d.fx = null; d.fy = null; }
          } else {
            // Map mode: store drop position as virtual lat/lon so it follows the map
            const ll = _leafletMap.containerPointToLatLng([event.x, event.y]);
            d._mapVirtualLatLon = ll;
            // Persist the dragged position so it survives page refresh
            setCustomNode(d.id, { lat: ll.lat, lon: ll.lng });
            renderGraphPositions();
          }
        })
      );

    nodeEnter.append("circle").attr("class", "graph-node-circle");
    nodeEnter.append("text").attr("class", "graph-node-label").attr("text-anchor", "middle");

    const nodeMerge = nodeEnter.merge(nodeBind);
    nodeMerge.select("circle.graph-node-circle")
      .attr("r",      d => 8 + 12*((_degree.get(d.id)||0)/_maxDeg))
      .attr("fill",   d => nodeColor(d))
      .attr("stroke", d => d3.color(nodeColor(d)).brighter(0.8))
      .attr("stroke-width", d => (d.lat != null || _customNodeData[d.id]?.lat != null) ? 3 : 2)
      .on("click", (event, d) => {
        dismissNodeEditPopup();
        const links = edgesArr.filter(e => e.a===d.id || e.b===d.id).length;
        const custom = _customNodeData[d.id];
        const locStr = d.lat != null
          ? `📍 ${d.lat.toFixed(5)}, ${d.lon.toFixed(5)}`
          : custom?.lat != null
            ? `📍 ${custom.lat.toFixed(5)}, ${custom.lon.toFixed(5)} (custom)`
            : "📍 No location";
        showGraphTooltip(event,
          `${effectiveName(d)}${hasCustomData(d) ? " ✎" : ""}\n` +
          (d.is_self ? "This device\n" :
            d.node_type != null ? `Type: ${["Client","Repeater","Room","Gateway"][d.node_type]||"Unknown"}\n` : "") +
          `${locStr}\n` +
          `Links: ${links}   Strength: ${(_degree.get(d.id)||0).toFixed(1)}\n` +
          (d.avg_snr  != null ? `Avg SNR: ${d.avg_snr} dB\n`  : "") +
          (d.avg_rssi != null ? `Avg RSSI: ${d.avg_rssi} dBm\n` : "") +
          "Right-click to edit");
      })
      .on("contextmenu", (event, d) => {
        if (!d.is_self) showNodeEditPopup(event, d);
      });

    nodeMerge.select("text.graph-node-label")
      .text(d => effectiveName(d))
      .attr("dy", d => -(10 + 12*((_degree.get(d.id)||0)/_maxDeg)));

    // Mark nodes that have custom overrides (italic label via CSS)
    nodeEnter.merge(nodeBind).classed("has-custom", d => hasCustomData(d));

    nodeBind.exit().remove();
    _gNodeSel = graphG.select(".gnodes").selectAll("g.gnode");

    // Apply persistent highlight classes
    _gNodeSel.classed("is-new",        d => _graphNewNodes.has(d.id));
    _applyNodeHighlight();
    _applyRouteHighlight();
    _applyZoomVisuals();

    // ── Drive simulation (force mode) or render directly (map mode) ───────
    if (!_mapMode) {
      graphSim.force("center", d3.forceCenter(W/2, H/2));
      graphSim.nodes(_gSimNodes);
      graphSim.force("link").links(edgesArr);
      graphSim.alpha(0.6).restart();
    } else {
      renderGraphPositions();
    }

    const countEl = document.getElementById("graph-node-count");
    if (countEl) {
      const totalN = graphNodes.size, totalE = graphEdges.size;
      const fN = filteredNodes.length, fE = edgesArr.length;
      countEl.textContent = fN < totalN || fE < totalE
        ? `${fN}/${totalN} nodes · ${fE}/${totalE} links`
        : `${totalN} nodes · ${totalE} links`;
    }
  }

  // ── SVG init ─────────────────────────────────────────────────────────────
  function initGraphSvg() {
    const svgEl = document.getElementById("graph-svg");
    if (!svgEl || !window.d3) return;

    const svg = d3.select("#graph-svg");
    svg.selectAll("*").remove();

    const zoom = d3.zoom().scaleExtent([0.05, 10]).on("zoom", (e) => {
      if (!_mapMode) {
        graphG.attr("transform", e.transform);
        _zoomK = e.transform.k;
        _applyZoomVisuals();
      }
    });
    svg.call(zoom);
    svgEl.__d3zoom = zoom;

    graphG = svg.append("g");
    graphG.append("g").attr("class", "links");
    graphG.append("g").attr("class", "gnodes");

    const { W, H } = graphContainerDims();
    graphSim = d3.forceSimulation()
      .force("link",      d3.forceLink().id(d => d.id).distance(120).strength(0.5))
      .force("charge",    d3.forceManyBody().strength(-450))
      .force("center",    d3.forceCenter(W/2, H/2))
      .force("collision", d3.forceCollide(34))
      .alphaDecay(0.015)
      .on("tick", graphTick);

    graphInited = true;
    // Catch up: apply any route highlight that arrived before the graph was opened
    if (_lastHighlightedMsg && _routeLinkKeys.size === 0) {
      const pathHashes = (_lastHighlightedMsg.path || []).map(h => (typeof h === "object" ? h.hash : h));
      highlightMessageRoute(_lastHighlightedMsg.sender_hash || "", pathHashes);
    } else {
      updateGraphViz();
    }
  }

  // ── Map / force toggle ────────────────────────────────────────────────────
  function setGraphMapMode(on) {
    _mapMode = on;
    const mapEl     = document.getElementById("graph-map");
    const svgEl     = document.getElementById("graph-svg");
    const btn       = document.getElementById("graph-map-toggle-btn");
    const resetBtn  = document.getElementById("graph-reset-btn");
    const tileSelEl = document.getElementById("graph-tile-select");
    if (tileSelEl) tileSelEl.style.display = on ? "" : "none";

    if (on) {
      // Show map first so Leaflet can measure the container
      mapEl.classList.remove("hidden");
      svgEl.classList.add("map-mode");
      if (btn) btn.textContent = "Force layout";
      if (resetBtn) resetBtn.textContent = "Reset positions";

      // Stop simulation — map mode doesn't need it
      graphSim.stop();
      d3.select("#graph-svg").on(".zoom", null);
      graphG.attr("transform", null);

      // Init Leaflet now (visible), or recalculate size if already inited
      if (!_leafletMap) { initLeaflet(); } else { _leafletMap.invalidateSize({ animate: false }); }

      // Fit to geo-nodes then render — wait for viewport to settle
      const pts = [...graphNodes.values()]
        .filter(n => n.lat != null && n.lon != null).map(n => [n.lat, n.lon]);

      let done = false;
      const doRender = () => {
        if (done) return; done = true;
        renderGraphPositions();
        _startMapRaf(); // keep positions in sync with any subsequent zoom/pan animations
      };

      if (pts.length >= 2) {
        _leafletMap.once("moveend", doRender);
        _leafletMap.fitBounds(L.latLngBounds(pts), { padding: [50, 50], animate: false });
        setTimeout(doRender, 300);
      } else if (pts.length === 1) {
        _leafletMap.once("moveend", doRender);
        _leafletMap.setView(pts[0], 13, { animate: false });
        setTimeout(doRender, 300);
      } else {
        doRender();
      }

    } else {
      _stopMapRaf();
      mapEl.classList.add("hidden");
      svgEl.classList.remove("map-mode");
      if (btn) btn.textContent = "Map view";
      if (resetBtn) resetBtn.textContent = "Reset layout";
      if (svgEl.__d3zoom) d3.select("#graph-svg").call(svgEl.__d3zoom);

      const { W, H } = graphContainerDims();
      graphSim.force("center", d3.forceCenter(W/2, H/2));
      graphSim.nodes(_gSimNodes);
      graphSim.force("link").links([...graphEdges.values()]);
      graphSim.alpha(0.8).restart();
    }
  }

  // ── Data ingestion ────────────────────────────────────────────────────────
  function processGraphSnapshot(data) {
    const brandNew = []; // IDs of nodes appearing for the first time ever in this snapshot
    for (const n of (data.nodes || [])) {
      const isNew = !graphNodes.has(n.id);
      graphNodes.set(n.id, n);
      if (n.id === "self") continue;
      if (!_graphKnownNodes.has(n.id)) {
        _graphNewNodes.add(n.id);
        if (isNew) brandNew.push(n.id); // genuinely just appeared
      }
    }
    // Merge server edge data but preserve any last_seen values we refreshed locally
    // (path edges get refreshed to now in highlightMessageRoute — don't overwrite them)
    for (const e of (data.edges || [])) {
      const key = `${e.a}:${e.b}`;
      const existing = graphEdges.get(key);
      if (existing && existing.last_seen > e.last_seen) e.last_seen = existing.last_seen;
      graphEdges.set(key, e);
    }

    updateGraphNavBadge();

    const onGraph = document.getElementById("page-graph").classList.contains("active");
    if (onGraph) {
      updateGraphViz();
      // Play appear animation on brand-new nodes
      if (brandNew.length && graphG) {
        graphG.select(".gnodes").selectAll("g.gnode")
          .filter(d => brandNew.includes(d.id))
          .classed("just-appeared", true)
          .each(function() {
            const el = this;
            setTimeout(() => d3.select(el).classed("just-appeared", false).classed("is-new", true), 600);
          });
      }
    }

    if (document.getElementById("page-rankings").classList.contains("active")) {
      renderRankings();
    }
  }

  // ── Toolbar buttons ───────────────────────────────────────────────────────
  document.getElementById("graph-map-toggle-btn").addEventListener("click", () => setGraphMapMode(!_mapMode));

  document.getElementById("graph-tile-select").addEventListener("change", function() {
    setMapTileStyle(this.value);
  });
  // Pre-select stored preference (tile layer itself is applied in initLeaflet)
  (function() {
    const sel = document.getElementById("graph-tile-select");
    if (sel) sel.value = localStorage.getItem("graphTileStyle") || "dark";
  })();

  document.getElementById("graph-reset-btn").addEventListener("click", () => {
    if (_mapMode) {
      // Clear all manual drag overrides — nodes snap back to computed positions
      for (const n of _gSimNodes) n._mapVirtualLatLon = null;
      renderGraphPositions();
    } else {
      graphSim.nodes().forEach(n => { n.fx = null; n.fy = null; });
      graphSim.alpha(1).restart();
    }
  });

  // ── Adverts page ─────────────────────────────────────────────────────────
  const advertsScrollEl = document.getElementById("adverts-scroll");
  const advertCards     = new Map(); // advert_id -> DOM card element
  let   advertHistoryData = [];      // completed advert summaries

  function fmtAdvertHeader(a) {
    const t = new Date(a.sent_at * 1000).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false });
    return `${fmtDate(a.sent_at)} ${t}`;
  }

  function buildAdvertCard(a, live = false) {
    const card = document.createElement("div");
    card.className = "advert-card" + (live ? " active" : "");

    const hdr = document.createElement("div");
    hdr.className = "advert-card-header";

    const pill = document.createElement("span");
    pill.className = "advert-type-pill" + (a.flood ? " flood" : "");
    pill.textContent = a.flood ? "Flood" : "Regular";
    hdr.appendChild(pill);

    const ts = document.createElement("span");
    ts.textContent = fmtAdvertHeader(a);
    hdr.appendChild(ts);

    if (live) {
      const liveTag = document.createElement("span");
      liveTag.className = "advert-live-tag";
      liveTag.textContent = "● Listening…";
      hdr.appendChild(liveTag);
    }
    card.appendChild(hdr);

    // Stats row
    const stats = document.createElement("div");
    stats.className = "advert-stats";
    stats.dataset.statsFor = a.id;
    card.appendChild(stats);

    // Sparkline placeholder
    const sparkWrap = document.createElement("div");
    sparkWrap.dataset.sparkFor = a.id;
    card.appendChild(sparkWrap);

    // Node list
    const nodeList = document.createElement("div");
    nodeList.className = "advert-nodes";
    nodeList.dataset.nodesFor = a.id;
    card.appendChild(nodeList);

    updateAdvertCardContent(card, a);
    return card;
  }

  function updateAdvertCardContent(card, a) {
    const stats = card.querySelector("[data-stats-for]");
    if (stats) {
      stats.innerHTML = "";
      const items = [
        ["Responses", a.total_responses ?? 0],
        ["Nodes",     a.node_count ?? (a.nodes ? a.nodes.length : 0)],
        ["Avg SNR",   a.avg_snr != null ? `${a.avg_snr} dB` : "—"],
      ];
      for (const [label, val] of items) {
        const s = document.createElement("div");
        s.className = "advert-stat";
        s.innerHTML = `<div class="advert-stat-label">${label}</div><div>${val}</div>`;
        stats.appendChild(s);
      }
    }

    const sparkWrap = card.querySelector("[data-spark-for]");
    if (sparkWrap && a.time_series) {
      sparkWrap.innerHTML = buildSparkline(a.time_series);
    }

    const nodeList = card.querySelector("[data-nodes-for]");
    if (nodeList && a.nodes && a.nodes.length > 0) {
      nodeList.innerHTML = "";
      for (const n of a.nodes) {
        const row = document.createElement("div");
        row.className = "advert-node-row";
        const nameEl = document.createElement("span");
        nameEl.className = "advert-node-name";
        nameEl.textContent = n.name || n.hash?.slice(0, 8) || "?";
        row.appendChild(nameEl);
        const chips = [
          n.count != null      ? `${n.count}×`          : null,
          n.avg_snr  != null   ? `${n.avg_snr} dB`      : null,
          n.avg_rssi != null   ? `${n.avg_rssi} dBm`    : null,
        ].filter(Boolean);
        for (const c of chips) {
          const chip = document.createElement("span");
          chip.className = "advert-node-chip";
          chip.textContent = c;
          row.appendChild(chip);
        }
        nodeList.appendChild(row);
      }
    }
  }

  function renderAdverts() {
    if (advertHistoryData.length === 0 && advertCards.size === 0) {
      advertsScrollEl.innerHTML = '<p style="color:var(--text-muted);font-size:14px;text-align:center;margin-top:40px">No adverts sent yet</p>';
      return;
    }
    advertsScrollEl.innerHTML = "";
    // Active windows first (most recent at top), then history (newest first)
    const activeIds = [...advertCards.keys()];
    for (const id of activeIds) {
      advertsScrollEl.appendChild(advertCards.get(id));
    }
    for (let i = advertHistoryData.length - 1; i >= 0; i--) {
      advertsScrollEl.appendChild(buildAdvertCard(advertHistoryData[i], false));
    }
  }

  // When advert is sent, add a live card at the top
  function onAdvertSent(a) {
    const card = buildAdvertCard(a, true);
    advertCards.set(a.id, card);
    if (advertsScrollEl.querySelector("p")) advertsScrollEl.innerHTML = "";
    advertsScrollEl.insertBefore(card, advertsScrollEl.firstChild);
  }

  // Live update to a node within an active advert
  function onAdvertUpdate(msg) {
    const card = advertCards.get(msg.id);
    if (!card) return;
    // Merge node into a synthetic summary and refresh card content
    const nodeList = card.querySelector("[data-nodes-for]");
    if (!nodeList) return;
    // Find or create row for this node
    const existingRows = [...nodeList.querySelectorAll(".advert-node-row")];
    let row = existingRows.find(r => r.dataset.hash === msg.node.hash);
    if (!row) {
      row = document.createElement("div");
      row.className = "advert-node-row";
      row.dataset.hash = msg.node.hash;
      nodeList.appendChild(row);
    }
    row.innerHTML = "";
    const nameEl = document.createElement("span");
    nameEl.className = "advert-node-name";
    nameEl.textContent = msg.node.name || msg.node.hash?.slice(0, 8) || "?";
    row.appendChild(nameEl);
    const chips = [
      `${msg.node.count}×`,
      msg.node.avg_snr  != null ? `${msg.node.avg_snr} dB`   : null,
      msg.node.avg_rssi != null ? `${msg.node.avg_rssi} dBm` : null,
    ].filter(Boolean);
    for (const c of chips) {
      const chip = document.createElement("span");
      chip.className = "advert-node-chip";
      chip.textContent = c;
      row.appendChild(chip);
    }
    // Update response count in stats
    const statsEl = card.querySelector("[data-stats-for]");
    if (statsEl) {
      const nodeCount = nodeList.querySelectorAll(".advert-node-row").length;
      const statDivs  = statsEl.querySelectorAll(".advert-stat");
      // Responses = sum of counts across all rows (approximation)
      let total = 0;
      for (const r of nodeList.querySelectorAll(".advert-node-row")) {
        const c = r.querySelector(".advert-node-chip");
        if (c) total += parseInt(c.textContent) || 0;
      }
      if (statDivs[0]) statDivs[0].querySelector("div:last-child").textContent = total;
      if (statDivs[1]) statDivs[1].querySelector("div:last-child").textContent = nodeCount;
    }
  }

  // Advert window closed — replace live card with final summary
  function onAdvertComplete(a) {
    advertHistoryData.push(a);
    const liveCard = advertCards.get(a.id);
    if (liveCard) {
      liveCard.classList.remove("active");
      const liveTag = liveCard.querySelector(".advert-live-tag");
      if (liveTag) liveTag.remove();
      updateAdvertCardContent(liveCard, a);
      advertCards.delete(a.id);
    } else {
      renderAdverts();
    }
  }

  // Advert schedule UI
  const advertSchedEnable   = document.getElementById("advert-sched-enable");
  const advertSchedInterval = document.getElementById("advert-sched-interval");
  const advertSchedType     = document.getElementById("advert-sched-type");

  function sendAdvertSchedule() {
    ws && ws.send(JSON.stringify({
      type:         "set_advert_schedule",
      enabled:      advertSchedEnable.checked,
      interval_secs: parseInt(advertSchedInterval.value),
      flood:        advertSchedType.value === "flood",
    }));
  }

  document.getElementById("btn-advert").addEventListener("click", () => {
    ws && wsConnected && ws.send(JSON.stringify({ type: "send_advert", flood: false }));
  });
  document.getElementById("btn-flood-advert").addEventListener("click", () => {
    ws && wsConnected && ws.send(JSON.stringify({ type: "send_advert", flood: true }));
  });
  advertSchedEnable.addEventListener("change",   sendAdvertSchedule);
  advertSchedInterval.addEventListener("change", sendAdvertSchedule);
  advertSchedType.addEventListener("change",     sendAdvertSchedule);

  // ── WebSocket ────────────────────────────────────────────────────────────
  const WS_URL = `ws://${location.host}/ws`;
  let ws = null;
  let reconnectDelay = 1000;

  function setStatus(state, label) {
    statusEl.className = state;
    statusEl.textContent = label;
  }

  _loadKnownGraphNodes(); // restore persisted set of seen nodes

  function connect() {
    setStatus("reconnecting", "Connecting\u2026");
    ws = new WebSocket(WS_URL);

    ws.addEventListener("open", () => {
      setStatus("connected", "Connected");
      reconnectDelay = 1000;
      wsConnected = true;
      updateCompose();
      if (currentDmKey) { dmInput.disabled = false; dmSendBtn.disabled = false; }
    });

    ws.addEventListener("message", (evt) => {
      let packet;
      try { packet = JSON.parse(evt.data); } catch { return; }
      if (packet.type === "history") {
        // Sort by id (receive order) not timestamp — device clocks can be wrong
        const sorted = [...packet.messages].sort((a, b) => (a.id || 0) - (b.id || 0));
        sorted.forEach(processMessage);
      } else if (packet.type === "message") {
        processMessage(packet);
      } else if (packet.type === "relay_update") {
        updateRelayRow(packet.msg_id, packet.relayers, packet.final);
      } else if (packet.type === "neighbor_update") {
        processNodeUpdate(packet);
      } else if (packet.type === "neighbors_snapshot") {
        packet.neighbors.forEach(processNodeUpdate);
      } else if (packet.type === "dm") {
        processDm(packet);
      } else if (packet.type === "dm_history") {
        packet.messages.forEach(processDm);
      } else if (packet.type === "contact_update") {
        processContactUpdate(packet);
      } else if (packet.type === "contacts_snapshot") {
        packet.contacts.forEach(processContactUpdate);
      } else if (packet.type === "contacts_cleared") {
        contactsMap.clear();
        updateContactsCount();
        if (document.getElementById("page-contacts").classList.contains("active")) renderContacts();
      } else if (packet.type === "autoadd_config") {
        autoaddToggle.checked = packet.value > 0;
      } else if (packet.type === "smart_add_config") {
        document.getElementById("auto-nodes").checked    = !!packet.config.nodes;
        document.getElementById("auto-paths").checked    = !!packet.config.paths;
        document.getElementById("auto-chatters").checked = !!packet.config.chatters;
        if (document.getElementById("page-pending").classList.contains("active")) renderPending();
      } else if (packet.type === "pending_contact") {
        pendingMap.set(packet.contact.pubkey, packet.contact);
        updatePendingBadge();
        if (document.getElementById("page-pending").classList.contains("active")) renderPending();
      } else if (packet.type === "pending_contacts_snapshot") {
        packet.contacts.forEach(c => pendingMap.set(c.pubkey, c));
        updatePendingBadge();
        if (document.getElementById("page-pending").classList.contains("active")) renderPending();
      } else if (packet.type === "pending_contact_removed") {
        pendingMap.delete(packet.pubkey);
        updatePendingBadge();
        if (document.getElementById("page-pending").classList.contains("active")) renderPending();
      } else if (packet.type === "graph_snapshot") {
        processGraphSnapshot(packet);
      } else if (packet.type === "advert_history") {
        advertHistoryData = packet.adverts || [];
        if (document.getElementById("page-adverts").classList.contains("active")) renderAdverts();
      } else if (packet.type === "advert_schedule") {
        advertSchedEnable.checked          = !!packet.schedule.enabled;
        advertSchedInterval.value          = String(packet.schedule.interval_secs);
        advertSchedType.value              = packet.schedule.flood ? "flood" : "regular";
      } else if (packet.type === "advert_sent") {
        onAdvertSent(packet);
        if (document.getElementById("page-adverts").classList.contains("active")) {}
      } else if (packet.type === "advert_update") {
        onAdvertUpdate(packet);
      } else if (packet.type === "advert_complete") {
        onAdvertComplete(packet.advert);
      } else if (packet.type === "ping_sent") {
        pingState.set(packet.contact_key, { status: "pending" });
        if (document.getElementById("page-contacts").classList.contains("active")) renderContacts();
      } else if (packet.type === "ping_response") {
        pingState.set(packet.contact_key, { status: "ok", rtt_ms: packet.rtt_ms, snr: packet.snr, rssi: packet.rssi });
        if (document.getElementById("page-contacts").classList.contains("active")) renderContacts();
      } else if (packet.type === "ping_timeout") {
        pingState.set(packet.contact_key, { status: "timeout" });
        if (document.getElementById("page-contacts").classList.contains("active")) renderContacts();
      } else if (packet.type === "contact_removed") {
        // Remove by 12-char key prefix
        for (const [k] of contactsMap) { if (k === packet.pubkey) contactsMap.delete(k); }
        updateContactsCount();
        if (document.getElementById("page-contacts").classList.contains("active")) renderContacts();
      }
    });

    ws.addEventListener("close", () => {
      setStatus("disconnected", "Disconnected");
      wsConnected = false;
      updateCompose();
      dmInput.disabled = true; dmSendBtn.disabled = true;
      ws = null;
      setTimeout(connect, reconnectDelay);
      reconnectDelay = Math.min(reconnectDelay * 2, 16000);
    });

    ws.addEventListener("error", () => ws.close());
  }

  // Initial empty state
  renderMessages();
  connect();
</script>
</body>
</html>
